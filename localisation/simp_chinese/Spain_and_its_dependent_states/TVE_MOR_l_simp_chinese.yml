l_simp_chinese:
        MOR_Afrika_Korps:0 "非洲军团"
        MOR_Afrika_Korps_desc:0 "与西班牙绝大多数本土部队不同，长期驻守摩洛哥的非洲军团装备精良、补给充足，是西班牙政府手中的制胜王牌。这支由本土军官、外籍士兵乃至当地变节者混编而成的部队，常年与摩洛哥武装冲突，积累了丰富的实战经验。他们既是镇压土著起义和国内动荡的“黑手套”，也是冷酷无情的屠夫。多位声名显赫的西班牙将领皆由此发迹，军团也因此备受重视。无论被视为刽子手、暴徒或反动分子，都无法否认他们是一支高效精锐的镇压机器——一群与死亡共舞的战争专家。"

        MOR_Emilio_Mora:0 "埃米利奥·莫拉"

