l_simp_chinese:
    DOM_The_Feast_of_the_Ram:0"公羊的盛宴"
    DOM_The_Feast_of_the_Ram_desc:0 "1930年，特鲁希略夺取了多米尼加的权柄，随后6年，多米尼加一直大元帅的统治下裹足不前，但西班牙人的利益得到了保障，对此，当局一直是睁一只眼闭一只眼。岛国发表一些意见。"

    
    DOM_Hector_Trujillo:0 "埃克托尔·特鲁希略"
    DOM_Hector_Trujillo_desc:0 "1935年对埃克托尔来说本就是不平凡的一年，这一年初，一场小型屠杀席卷了特鲁希略城，但是 最终这场暴乱让西班牙人惊恐的害怕这个保护国失去控制，在西班牙的压力之下，特鲁希略辞职，将总统的位置让给了海军部长，弟弟埃克托尔\n。尽管名义上如此，但是实际上实权仍然掌握在公羊的手中。"

    DOM_spanish_influence:0 "西班牙影响度:适中"
    DOM_spanish_influence_desc:0 "也许这只被拔了牙的狮子没有攻击力了，但是1935香菜事件仍然告诉我们西班牙仍然可以对这个加勒比的小小"