l_simp_chinese:
      EQG_rainforest_zone:0 "雨林地带"
      EQG_rainforest_zone_desc:0 "这里没有征服，只有被征服。赤道几内亚的雨林是一座自我繁殖的绿色地狱——浓密的树冠扼杀光线，腐烂的根系吐出毒瘴。每一寸空气都饱含水分，滋养着恶性疟原虫与食肉菌。河流是流动的腐水，暴雨能在顷刻间让小径变成鳄鱼的巷道。这不是一片被统治的土地，而是一个缓慢消化一切闯入者的、活着的消化系统"

      EQG_Gonzalo_Cuepo_Deliano:0 "贡萨洛·奎波·德利亚诺"

