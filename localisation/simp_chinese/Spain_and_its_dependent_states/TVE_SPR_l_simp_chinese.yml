l_simp_chinese:
    SPR_Miguel_Primo_Derivella:0 "米格尔·普里莫·德里维拉"
    SPR_Miguel_Primo_Derivella_desc:0 "当米格尔·普里莫·德里维拉将军在1931年那场流血的政变中接管西班牙时，这个饱受政局动荡和殖民地战争折磨的国家，似乎终于迎来了一位能挥舞军刀斩断乱麻的强人。他来自安达卢西亚的贵族家庭，在摩洛哥和殖民地的赫赫军功为他赢得了威望。国王阿方索十三世的默许，更让这次行动披上了拯救国家于危难的光环。他承诺用“国家、宗教、君主制”的铁腕配方，为西班牙带来秩序与稳定，一场自上而下的“手术”即将开始。\n上台之后，他立刻开启了与，社会党人无政府主义者和分离分子的肮脏战争，直到1934年11月，训练有素的摩洛哥非洲兵团踏进了叛乱者在加泰罗尼亚的最后一个据点时，这场血腥的内战才终于结束，而这位独裁者也真正的掌握了整个国家。只不过现在就有你西班牙的雄狮，已年近七旬，却仍然大权在握不肯放手，这无疑让人民在心中产生了一个巨大的疑问，独裁者之后又会是谁呢？"

    SPR_dictator:0 "大独裁者"
    
    SPR_Legacy_of_the_Civil_War:0 "内战的遗产"
    SPR_Legacy_of_the_Civil_War_desc:0 "在较早时期，欧洲内战的敌对双方是为了相对有限的目的，内战的经常不过是为了变更统治者。然而，到了20世纪，这些战争变成了革命斗争，具有决定性性质，每一方都寻求建立一种新的社会和文化秩序。每一次革命内战，并不仅仅是一场政治斗争，也是有关社会，宗教与文化的终极冲突。在要求一种完整的，妥协的解决方案。\n西班牙内战正是这一转变的典型体现。这场持续三年的血腥战争，给整个国家带来了深重灾难。即便作为胜利一方的国民军，在战后仍面临重重挑战：比利牛斯山脉深处活跃的游击队、被战火摧毁的工业体系、以及成千上万羁押在监的政治犯……这些都成为“胜利之后”必须直面的艰难遗产。"
    SPR_spanish_army:0 "西班牙军队"
    SPR_spanish_army_desc:0 "长期以来，西班牙军队常因效率低下与战术陈旧而闻名。然而，在阿方索十二世推行军事改革之后，其整体实力已不容小觑。在第一次世界大战与摩洛哥殖民战争中的表现虽不耀眼，但也堪称中规中矩，尤其以参与干预俄国内战的“蓝色师团”为代表，展现出一定的作战素质。\n作为国家体制中最具实力的组织，军队被要求忠诚于国家、上帝与最高统治者。然而，内战期间暴露出的战术分歧与指挥冲突，已为政府与军方的关系埋下隐患。若不能妥善维系与军队高层的关系，政权将始终面临一轮又一轮的军事颠覆风险。因此，我们必须持续推进军队的职业化改革，并谨慎回应其诉求。眼前的稳定或许只是表象，真正的风暴，往往潜伏在黎明将至之时。"
    SPR_The_hanging_throne:0 "空悬王座"
    SPR_The_hanging_throne_desc:0 "西班牙内战结束后，出现了一个耐人寻味的政治局面：从法律层面看，新政权并未废除君主制，王位在法律上依然虚悬待继；然而在现实中，国家已完全置于一个专制政权的掌控之下。官方称呼其为“元首”，也有人直言不讳地称之为“独裁者”。如今，这位统治者年事已高，其身后之事逐渐成为各方势力关注的焦点。\n自由派期盼能借此机会重建第二共和国；卡洛斯派则视其为恢复王统的最后机遇；军方则选择暂作壁上观，静待局势演变。\n然而，对现状最为不满的，或许正是独裁者之子、长枪党领袖何塞·普里莫·德里维拉。在他看来，无论是君主制还是资产阶级共和制，皆已成为西班牙前进的桎梏。唯有由长枪党全面执掌政权，才能真正实现国家的复兴。"
    SPR_Autonomy_Dilemma:0 "自治难题"
    SPR_Autonomy_Dilemma_desc:0 "在战后西班牙的灰烬中，没有哪个问题比巴斯克与加泰罗尼亚的自治命运更能象征那场内战的裂痕。这两个地区曾作为共和派的坚实堡垒奋战至最后一刻，如今，胜利的国民军政权决心彻底清算这份“背叛”。他们过去享有的自治权被无情废除，语言文化被公然打压，连最基本的民族象征也沦为非法。\n然而，独裁政府的强硬手段并未真正抹去两地人民的身份认同。在加泰罗尼亚，中产阶级与知识界虽在战后初期被迫沉默，但那份对共和岁月的记忆与自治的渴望，只是转入了地下悄然滋长。而在巴斯克，问题则更为严峻：连绵的青山成为反法西斯游击队出没的屏障，分离主义的情绪因镇压而愈发坚定，使得该地区始终是政权体内一根难以拔除的毒刺。"

