    CSA_Placeholder:0 "占位"
    
    
    CSA_slave_and_industry:0"奴隶与工业化"
    CSA_slave_and_industry_desc:0"\n\n\n\n£GFX_CSA_slave_and_industry_Pictures\n\n\n\n\n\n在第一次美国内战之后  的日子里，奴隶制与现代工业化的冲突日益明显，在加州，许多旧庄园主和蓄奴人依旧在乡村和城市郊区从事着黑暗的奴隶买    卖；而在费城与里士满，工业化的浪潮正逐步吞没落后的田园区，而工业与农业的发展矛盾逐渐演变成了邦联大会上的政治问题    ……"
    CSA_west_slave_baodong:0"西部奴隶暴动"
    CSA_west_slave_baodong_desc:0"自从伦敦经济危机和里士满条约签订后，北部与首都四周的部分黑人奴隶在名义上获得了解  放，但这项政策改革后引起了大会内众多传统迪克西派和奴隶主的巨大不满。\n\n在震惊整个全国的“40”事件（庄园内黑奴爆发  反剥削抗议，共有40名黑人奴隶被白人公开处死）后，引起了全国性的黑人奴隶暴动，最严重的便是西部洛杉矶城和路易斯安那  州等地，与此同时北方的杨基势力和康米主义者趁机在西部进行了渗透，部分黑人奴隶自愿组成了“黑人自由军”以对抗邦联……"
    CSA_west_slave_baodong_tt:0"§Y佛罗里达州§!、§Y路易斯安那州§!、§Y加利福尼亚州§!等§Y邦联州§!的§Y民用工厂§!和§Y    基础设施§!建造速度§R-50%§!！\n"
    CSA_west_slave_baodong_dm:0"西部奴隶暴动"
    CSA_victory_of_civ_war:0"内战胜利者"
    CSA_victory_of_civ_war_desc:0"经历了四年左右的艰苦奋战，伟大的罗伯特李将军带领着他忠诚的部下成功击溃了杨基佬的  暴君之军，而在南边的墨西哥，伟大的路易斯安那州军队和农民郑昭君也击碎了他们企图侵犯我们迪克西土地的意图，我们不仅  取得了政权的独立，还在接下来的20余年里持续将我们的土地建设的更好\n\n然而，伟大的邦联虽统治了整个南方，但这场战争  所带来的伤痛也使我们至今仍未完全恢复，田野里被炮火摧残的农作物、城市的重建与复兴工作、劳动力的短缺等问题仍是我们  要解决的头等大事……"
    CSA_jackson_stone_wall:0"“石墙”杰克逊精神"
    CSA_jackson_stone_wall_desc:0"\n\n\n\n£GFX_CSA_jackson_stone_wall_Pictures\n\n\n\n\n\n托马斯·乔纳森·杰克逊  （1824年1月21日－1869年5月10日），绰号“石墙”，是内战期间著名的邦联军将领。他曾在墨西哥-美国战争中担任美陆军军 官，包括在奇瓦瓦战役中表现出色。从1851年到1861年，杰克逊在弗吉尼亚军事学院任教。1851年曾在弗吉尼亚军事学院任教。 1861年，弗吉尼亚州脱离美国，杰克逊应征加入南军。1857年7月，他在邦克山战役中指挥一个旅，为南军提供关键增援，击退  了凶猛的北军攻势。因此，巴纳德将军将杰克逊与一块“石头墙”相提并论，这也成为了杰克逊的绰号。\n时过境迁，这种精神依  然被民间传颂，杰克逊精神不仅代表着为家乡而死为家乡而战的忠心，更象征着各州团结在一面旗帜下共同抗击北方压迫的决    心。"
    CSA_fight_with_dixie:0"与迪克西共进退"
    CSA_fight_with_dixie_desc:0"我们生在南方，作为一名南方人，无论男女老少，都誓要为邦联和祖国付出最后一滴血，为了  联盟国！为了罗伯特李将军！"

    
