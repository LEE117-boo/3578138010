    CSA_Harold_Iks:0 "哈罗德·伊克斯"
    CSA_Harold_Iks_desc:0 "§Y传统派§!\n§Y内政部长§!\n美国南方州政治家，生于宾夕法尼亚州弗兰克斯敦。1897年毕业于芝   加哥大学，属新南方民主党，1907年，伊克斯被伊利诺伊州律师协会录取后转向考夫林派政治"
    CSA_henry_ford:0 "亨利·福特"
    CSA_henry_ford_desc:0 "§Y工业派§!\n汽车工程师与著名企业家，福特汽车公司的建立者，曾在大会上提出“全民汽车计划”"
    CSA_Lyndon_B_Johnson:0 "林登·B·约翰逊"
    CSA_Lyndon_B_Johnson_desc:0 "§Y工业派§!\n§Y建设部长§!\n约翰逊1930年毕业于得克萨斯州西南师范学院；1934年下旬任   全国青年总署得克萨斯州公署署长。与休斯顿州长和当地官员有密切往来"
    CSA_Joseph_Raymond_McCarthy:0 "约瑟夫·雷芒德·麦卡锡"
    CSA_Joseph_Raymond_McCarthy_desc:0 "§Y传统派§!\n§Y外交部长§!\n麦卡锡自幼家境贫穷，破产后便跟随家人来到威斯康星  州的马娜瓦，并找到了一份就杂货店员的工作补贴家用，20岁时进入马娜瓦市的小朗高中就读，并顺利毕业考入了马奎特大学，  毕业后顺利成章成为了一名律师并获取了律师资格证。"
    
