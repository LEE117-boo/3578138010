TVE_DSB_JIESHAO_desc: "[TVE_desc_loc]"
TVE_desc_loc_AUS: "倘若将时间轴轮播动至中世纪，谈及此时叱咤欧陆之辈：西班牙，勃艮第，神圣罗马，匈牙利等不胜枚举；时过境迁，这些国家或是苟延残喘，或是已从地图上消逝，或是被仇恨与羞耻蒙蔽双眼，亦或是静待时机反戈一击......而当名为旧日的层层面纱被揭示，它们都曾拥有一个共同的姓氏------哈布斯堡.\n即使是鲁道夫一世也未曾料想，自己家族作为于1273年神圣罗马帝国诸侯畏惧教皇与奥托卡二世妥协而被推出的提线木偶，竟能开启一段如此波澜壮阔的辉煌历史------率领天主圣徒收复圣城，在宗教战争中誓死捍卫天主信仰，更是于欧罗巴几近被拿破仑军靴踏碎时高举圣战之旗中孑然逆行\n他也未曾料想到，1936年的哈布斯堡，会是如此之衰败景象：维也纳华丽动听的提琴声依旧，但每每跳足远望，波希米亚的工厂早已不为帝国而轰鸣，布达佩斯的货船上也不再悬挂着二元旗帜，斯洛文尼亚与斯洛伐克山头此起彼伏的枪声都在一遍遍地预演着对哈布斯堡家族丧钟的敲动......\n一九三六年，哈布斯堡家族的生死之年，仇恨与火焰再无法被铁腕所束缚，即将到来的，是自1848年来民族革命的终焉回响.\n这个已延绵七百余的长者，已做好准备来迎接属于自己的裁决————涅磐或是死亡，瞬息之间."
TVE_desc_loc_POL: "如果你在十九世纪，对着一个波兰人（如果他还这么认为），说他的国家会再度崛起，甚至成为东欧一霸，他会对你表达他最真挚的中指，“别闹了，怎么可能！”1795年，最后一支科希丘什科起义军放下武器后，波兰人迎接着“亡国奴”的身份进入了十九世纪，并且在拿破仑西征的溃退下，再到绝望的31年，48年，63年的起义一次又一次失败后，波兰成为了整个欧洲最失败的国家，甚至不能说是国家，一个亡国的现实貌似已经被确认，波兰已经成了死局。\n谁知道波兰会再次崛起？社会主义的滋润，工业的发展，军事组织的抵抗在一次意大利冲突而全面爆发的世界大战中犹如火星得到了火绒，她重新被点燃，直到把整个世界熊熊燃烧，在波兰地区的血腥沙场下，德意志帝国和沙皇俄国在此流干了血，而波兰人却在时刻准备，他们同时对三个皇帝效忠，却无不忘记自己心中对波兰母亲的誓言。\n可以说，他们赌对了。\n奥匈帝国铩羽而归，俄国深陷革命。德国内乱四起，等到约瑟夫毕苏斯基高声宣布“遵从整个民族共同的愿望，波兰国家重新诞生了。”波兰母亲从撕裂的大地中重新傲然雄起。\n毕苏斯基一直有一个雄心勃勃的计划，波兰必须重建昔日的波兰立陶宛联邦，共同对付德国俄国巨人，他称呼其为普罗米修斯计划，他赌对了，波兰军队一路畅通无阻……等到俄罗斯代表灰溜溜签下里加条约后，波兰骤然已经成了二十世纪最成功的国家。\n只可惜生活永远无法一帆风顺，伦敦危机和五月政变消耗了政府的声望，虽然五年计划和格拉布斯基的兹罗提改革得以施行，但是波兰貌似被绑定在萨那其亚的机器上，这个机器缺少润滑剂，但是因为毕苏斯基本人的固执，貌似没人愿意敢动这台机器，同时在波兰的内部，希米格维和斯瓦韦克的公开矛盾早就不是秘密，工农支持从俄国逃回来的捷尔任斯基的政策，但是捷尔任斯基不像是最好的答案，西科尔斯基则在欧洲四处奔波，而毕苏斯基元帅的身体愈来愈下了。\n谁能决定波兰的未来？波兰能保持他傲然的自由姿态吗？或许，有朝一日，在面对强敌之时，东布罗夫斯基的故事能再次重维斯瓦河上唱起？\n决定元帅的继承者，掌握波兰的未来！\n努力让捷尔任斯基完成他的计划，找准机会，再次在欧洲发动世界革命！"
POL_yuanshuai_yuanze: "元帅原则"
POL_yuanshuai_yuanze_desc: "元帅说的就是真理，元帅说的务必坚持。\n“元帅”已经成了波兰人民对约瑟夫毕苏斯基的敬称，自从1921年出任波兰全国军队总司令之后，元帅一衔便再无人有所染指，在萨那其亚的体制下，元帅在默默的指导波兰，元帅的手指指向哪里，哪里就是波兰人前进的道路。\n德意志帝国的迅速崛起，元帅愈来愈下的身体，民众们已经很少再看见元帅的公开露面了，元帅的秘书斯瓦韦克和元帅的继承人希米格维的矛盾已经不再是秘密，在贝尔维德宫外的大声争吵之中，只留下垂暮老人抚摸女儿的头发。\n“我走后，谁还能来带领波兰打倒那些帝国主义呢？”\n他不甘心。"
POL_jiaoaode_bolanren: "骄傲的波兰人"
POL_jiaoaode_bolanren_desc: "自从大战结束后，波兰人一直在赢，大赢特赢。\n立陶宛在一周之内被打垮了，拉脱维亚不敢抵抗波军前进的道路，俄国巨熊也在第聂伯河下的百日血战中败退不已，东方的日耳曼敌人正入分裂之苦，盖特曼之剑下，波兰人的东欧无不屈服。\n爱德华希米格维势要夺回东普鲁士，小小的流亡之师必然在波兰大军的脚步下重演，波兰人的历史课本下没有属于他们的注脚，虽然这次冒险的军事计划被毕苏斯基怒斥了回去，但是希米格维仍未放弃他的伟大目标。\n波兰人在元帅的带领下赢了二十年，而他希米格维要带领波兰再赢二十年。\n克拉科夫的血在慢慢流淌……"
POL_haibiande_kanke: "海彼岸的看客"
POL_haibiande_kanke_desc: "“波兰就像海边的看客，站在安全的海岸上，平静地看着海上的暴风雨在面前呼啸。”在风云变幻的欧罗巴，东欧的炮火声已经停息了许久，人们已经忘记了战争。\n在一切平和的环境之下，整个局势却慢慢开始变着戏剧化，噶尔巴仟的山脉旁，波罗的海的森林中，反海间联邦的自由斗士们势要让祖国彻底自由，摆脱波兰的新帝国主义影响。\n波兰的电台无时无刻都在愤慨的怒骂这些抵抗分子，却带给世界的只有波兰的名声不佳，这种看客思维都是极让人疑惑的，只能让人们认为，波兰是一个悠闲的垂钓者，丝毫不知远处的洪水正在袭来……"
POL_5nian_jihua1: "未竟的五年计划：尴尬的地步"
POL_5nian_jihua1_desc: "伦敦大危机的影响已经在波兰的土地上慢慢拂去，用于治疗波兰经济伤口的雄心勃勃的捷尔任斯基第一年五年计划在其迅速的下台使得五年计划进行到一种尴尬的地步。五年计划得到了计划，但是却从未得到很确切的实施，农民工人对其非常不满，现今政府要么兑现昔日捷尔任斯基的诺言，要么就搪塞过去，免得因为五年计划的遗产为其陪葬……\n机动作战和弹性防御之争执"
POL_zhanshu_zhengzhi: "战术政治"
POL_zhanshu_zhengzhi_desc: "西科尔斯基在《未来战争：其可能性、角色、与国防相关的问题》中特别强调机动作战在波兰的战争未来意义，新的一批波兰TKS和7tp订单在不断产出，不过对于波兰的传统骑兵概念，波兰国内对其并不以看重，再加上西科尔斯基对毕苏斯基的反对，此书一度被加以冷落，这一种混乱的军事思想在波兰军队中交换着，毛采克将军的波兰第一装甲师和波德霍尔斯基将军的扎扎师在近期的演习中得出了一个较糟糕的结论，双方在各自都占不到绝对性优势，所以在波兰军事不在确认彻底的一方面改革之下，波兰军事的思想混乱依然会存在许久……\n现在的元帅（约瑟夫毕苏斯基）支持：弹性防御"
POL_aidao_beike: "哀悼约瑟夫贝克"
POL_aidao_beike_desc: "约瑟夫贝克，元帅的挚友，前波兰外交部长，在前段日子出访海间联邦成员国之时被乌克兰民族武装袭击，我们永远失去了这位伟人。\n尽管我们不断催促乌克兰政府快速清剿极端组织武装，但乌克兰方面对此暧昧……并且在对贝克进行哀悼的同时，值得波兰对乌克兰方面干涉过多。\n贝克已经逝去，民族的仇恨已经逐渐深稳，昔日我们还是朋友，但是明日你点起了我的房屋，海间联邦之间民族的矛盾愈加愈重，甚至有传言，乌克兰方面要退出海间联邦，这对于波兰来说都是万万不可容忍的……\n贝克的遗容之下，多少刀光剑影？"
POL_yuanshuai_weidazhiren_desc: "毫无疑问，约瑟夫莱门克斯毕苏斯基，也称元帅，是二十世纪初欧洲最伟大的人，他用他的宝剑划开了属于波兰人的应许之地。\n毕苏斯基生于立陶宛，年轻之时就开始参加波兰强烈的反俄运动，在1905年罗兹工人起义中，毕苏斯基表现果敢，虽然起义最终失败，但这给毕苏斯基带来了不少的社会人气。\n一战之中，毕苏斯基先是对德皇表示忠诚，后拒绝效忠被关进监狱。\n大战结束后，毕苏斯基随着一阵阵欢呼的波兰人群在华沙宣誓效忠，并无时不刻执行着他的“海间联邦”计划，他赌对了，波兰军队一路畅通无阻，军事的胜利，毕苏斯基的微笑，让没有人再敢反对他的计划。\n对德预备突击受挫，伦敦经济危机，常年的肺病，毕苏斯基的身体愈渐愈差，希米格维的疯狂计划，捷尔任斯基的不忠，斯瓦泰克的寡断，西科尔斯基，冯哈勒离开了他。\n可能就随着他说的那样。\n“波兰是一个伟大的国家，但是生活在这片土地上的都是婊子。”"
POL_yuanshuai_weidazhiren: "元帅，波兰历史上最伟大的人"
POL_TVE.1: "波兰，在风雨中飘摇"
POL_TVE.1.t: "波兰，在风雨中飘摇"
POL_TVE.1.desc: "每一个波兰人都忘不记1795年那个艰难的岁月，123年之久的潇然之烟，随着德意志帝国和沙皇俄国的崩溃重新燃起，人们不会忘记那以往的亡国岁月，也不会忘记这是属于波兰最后的机会，波兰的军队被迅速组建起来，奥匈帝国向协约国的妥协让克拉科夫地区重归波兰，而剩下的边界线，只能靠波兰人的热血和枪支划定了。\n1919年，波兰人不宣而战，跨过了波乌边界，迫使彼得留拉和波兰签订基辅合约，乌方放弃西部领土，波兰选择支持乌克兰独立，并继续朝着第聂伯河前进。1920年5月23日，波军跨过第聂伯河，红军奋抵抗，双方在明斯克展开血战，但是波军的脚步实在太快了……三个月后，面对白军的疯狂反扑，红军只得灰溜溜的在签订俄波协约，俄国退出乌克兰，波罗的海三国，双方停火。\n拉脱维亚不战而降，立陶宛在一只被默许的波兰部队之下政变式的加入海间联邦，而爱沙尼亚人选择沉默，这是属于波兰人的时代，这是波兰人的新征服。\n战争结束了，波兰共和国临时政府宣告解散，约瑟夫毕苏斯基成为了新的元首总统，以毕苏斯基的名义下波兰的政权开始在一种被称作“萨那齐”的状态下悄然改造着……\n1926年宪政危机\n按照1922年波兰五月宪法实施，总统应一届担任四年，政府内阁将从波兰色母大议会中选出，因为魏玛德国封锁波兰经济以及白军在俄罗斯的胜利，海间联邦重新面对被孤立的危险，在此，国家民主党领袖罗曼德莫夫斯基提出要向俄国伸出橄榄枝，重新对付日耳曼危险，而小农党的维托斯也重新宣告要让政府继续关注波兰农民糟糕的现状，于是如此，1926年选举中，国家民主党和小农党的执政联盟获得了将近60%的高等席位，这对于毕苏斯基来说是无法容忍的，于是在1926年7月22日，毕苏斯基以“元帅”的身份，从华沙出发，带领自己的部队前往华沙，政府色母议会宣告解散，波兰的民主遭受了巨大的打击，国家民主党领袖德莫夫斯基远逃俄国，在重新的议会组织下，政党政治被有所打击，而是依靠希望和政府合作的身份人员进行统治。\n伦敦大危机和克拉科夫农民暴动\n1929年伦敦大危机几乎摧毁了波兰的经济，出口停摆，制裁，波兰经济崩溃，虽然波兰政府进行了一系列兹罗提改革，但是对于波兰经济的影响微乎其微，因为波兰的经济大多是出口农业品，经济危机的国际制裁导致波兰的农业出口腰斩，在1932年，克拉科夫农民在农民党的领导下宣布暴动，政府军与农民展开了对抗。\n毕苏斯基立刻启用自己的老朋友捷尔任斯基担任总理，开启了国有化和对农民的改革，波兰的五年计划开始执行，在两个月之后，农民暴动宣告结束，但是这也给波兰带来不小的麻烦，波兰的农民力量已经到达了从未有过的高度，如果波兰的农业改革不彻底，那么类似克拉科夫式的危机任然不可小看……\n1933年，波兰宣告已经从伦敦的经济大危机中摆脱出来，捷尔任斯基希望将波兰的五年计划更加深入，社会更加进行其中的社会化。却无不遭到小农党和军队的抨击，1933年，捷尔任斯基政府倒台，毕苏斯基对此表示沉默。"
POL_TVE.1.a: "代码是无情的生物"
POL_TVE.2.t: "东普鲁士危机"
POL_TVE.2.desc: "1933年东普鲁士危机\n1933年,毕苏斯基下令波兰军队全员备战，准备对德国发起最新的攻势，不过法国拒绝了毕苏斯基的要求，原因是法国军队无法做好准备，并且法国对波兰对东普鲁士的态度非常不满，至此，波兰法国关系破裂，波兰军队副司令爱德华希米格维策划着进攻势东普鲁士，复刻他在1920年对立陶宛的政变进军，这一计划被毕苏斯基给骂了回来，因为毕苏斯基不愿意过度激怒法国，于是波兰选择保持中立，对于东普鲁士，波兰人一直在摩拳擦掌……\n元帅的继承者，海间联邦的未来。\n自从1930年开始，毕苏斯基的身体便愈来愈差，他对政府中的争吵没有别人决策，他对政府没有什么兴趣，他就对军队有所兴趣，即使他的态度越来越急躁，越来越让人哀叹，但是他的目的无可指摘，他迟迟没有选择自己的继承者，秘书斯瓦泰克希望和法国重新和解，抵抗东方危险，而朋友捷尔任斯基希望波兰能尊崇元帅的过去，让波兰更加社会主义化，元帅的下属希米格维希望能够摧毁东普鲁士威胁，让海间联邦愈加扩大，而西科尔斯基等人仍然被软禁之中。\n而海间联邦依然不太平，立陶宛方面担心波兰迟早一天要吞并立陶宛，恢复联邦，而乌克兰民族武装依然在为被吞并的西乌愤慨，不同程度的抵抗在消耗联邦的信誉，1935年，在利沃夫，约瑟夫贝克上校遇害，导致波兰方面花费了十周时间建立集中营，并且血洗了利沃夫地区，烧毁了大多数的乌克兰村庄。\n海间联邦要么继续为此下去，要么就得为此崩溃。"
POL_TVE.2.a: "代码是无情的生物"
AUS_EMPIRE_neutrality_TVE: "奥地利帝国"
HUN_EMPIRE_neutrality_TVE: "匈牙利王国"
AUS_HUN_FAC: "奥匈帝国"
aus_economy_experience_value: "[?aus_economy]"
red_write_blue: "赤旗高昂"
red_write_blue_desc: "人民的旗帜在西方高昂。\n在一个帝国、民族与独裁者当道的时代，在昔日超级大国的废墟之上，新的英国正发出耀光。你可曾听过繁盛帝国之下人民的呼喊？你可曾听过威尔士矿工、英格兰职员或苏格兰农民的声音？如今，在不列颠之上，劳动人民发出了他们长久以来真正的强音。历史证明，无需王公贵族，抛开旧制，人民自能发展并走向富饶。\n如果这也无法打动你，便顺泰晤士河而上吧：去观看白崖上昼夜不息的航空港吧，去接近伦敦遮天蔽日的工业心脏吧，去靠近索尔兹伯里平原上一望无际的农田吧。人民为他们的政权爆发出无上的热忱；他们将全身心奉献给了忠于人民的国家，而国家回报人民以繁荣、福利与强盛。在全世界范围内，每一位劳动者都向往着、关注着人民的英国，而英国共产主义的浪潮正猛烈地、有力地拍打着世界的礁石。英国旧日是，今日是，明日也仍会是——世界的灯塔。\n就让赤旗高昂，在新世界的曙光下向前进！"
Across_the_ocean: "重洋彼岸"
Across_the_ocean_desc: "不列颠依旧统治着辽阔的土地——尽管在内战之下，各自治领在实际上已然独立。当赤旗遍布不列颠岛时，自治领却以怀疑的眼光，望向这个新生的人民国家与世界的共产旗手。一个颠覆性的红色政权，能否继续引领它们？或者说，伦敦的委员会能否代表昔日英国的一切？\n当赤色的旗帜在昔日属地上空迎风飘扬，旧帝国的残片却仍在午夜时分游荡于大洋之上，嘶吼着过往的光荣、压迫、荣耀与坠落。\n红旗招展，而这一次，帝国能否在共产主义的光辉下获得重生？"
Corruption_and_welfare: "腐败与“福利”"
Corruption_and_welfare_desc: "不列颠的土地上从未真正清除过腐败。自托利党与辉格党的时代起，贪渎与腐败便严重扼制着不列颠的发展。在旧王国，腐败甚至被美其名曰“福利”，被比作政治的润滑油。而如今在人民国家，贪腐亦不鲜见。你若持着一沓钞票踏入机关，无疑会享受到“优先”的待遇。\n但赤旗之下岂能容得此事？腐败一日不清，不列颠便一日不得解脱。"
years5_plan: "五年计划"
years5_plan_desc: "委员会的领土曾经富庶而脆弱，依赖旧帝国的金融剥削而存活。但在战争、孤立与鲜血之中，不列颠却凭借一个个五年计划重新站起。英国工业的份额飞速增长，甚至可谓重拾了“世界工厂”之名；航空、造船与军事科技在大规模投入下已居于世界前列。在这片历经建国、革命与发展的土地上，昔日的奇迹正被重新铸就。\n然而在钢铁与引擎的轰鸣之下，计划的代价也逐渐显现。国家向强盛与富裕全力奔驰，人民却被逐渐落在身后。行业间的贫富差距日益加深，人民利益不得不为高速发展让道。\n如何在计划与人民之间寻得平衡？如何改革计划体制？在委员会大踏步前进的路上，或许有时也需俯身低头，将人民重新推向富裕与平等。"
red_amary: "红军在前进！"
red_amary_desc: "“从小亚细亚到英吉利海峡，红军的战士们最强大！”\n怀有信念的军队坚如磐石，怀有信念的军队不可阻挡。作为在钢铁与火焰中锻造的军队，红军——或称英国人民国防军——忠于国家与人民，凭借坚定的信念与精良的装备，屹立于不列颠的每一寸土地。红军所展现出的战斗力，已令全世界为之侧目。\n然而在红军内部，三军的理念却大相径庭。陆军深受德意志学说影响，主张大规模机械化突击；空军与海军则力主火力优势与制权作战。三军的理念必须得到妥善统合，否则在党的旗帜之下，红军又如何协同一致、继续前进？"
The_Big_Three: "三巨头"
The_Big_Three_desc: "委员会的最高权力属于三人：委员长麦克唐纳、总理艾德礼与财政部长莫里斯。作为三种不同理想、不同阶层的代表，他们在过去十年中相互妥协、彼此协作，维持着委员会的统一与发展。然而表层之下，党中央、政府与财政部之间的冲突始终不断，恰如共产主义、宪政社会主义与国家社会主义之间的路线斗争。英国未来的道路，将在很大程度上取决于他们之间的博弈。"
POL_pulom_fire: "普罗米修斯之火"
POL_pulom_fire_desc: "1848年的欧洲民族革命被世界上最反动邪恶的三个帝国主义国家联合起来共同扑灭了，但是他的遗产尚存，普罗米修斯计划随着革命的浪潮的尘土下，焕然诞生，波兰必须和那些曾经受难和现在依然受难的民族团结起来，共同打倒帝国主义，这一带有明显社会主义色彩的计划以至于被约瑟夫毕苏斯基重新拾起，并且被定义成了波兰国家生存的必要目标。波兰宣称他们要带领“所有被压迫的民族”共同团结起来，为了你们和我们的自由成了一系列革命者浪漫风采的口号，马德里，维也纳，布拉格，高加索，波兰的特工在无数的地方埋下了星星之火，就等那一个最光辉的时刻，等到那时，让世界熊熊燃烧！"
