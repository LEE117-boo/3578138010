Habsburg_ARMY: "臃肿的军队"
Habsburg_ARMY_desc: "§4如果我们不进行军事改革，那么我们在面对敌人时将毫无还手之力\n\n§4奥匈帝国的部队已经变成了一种耐人寻味的“干尸”，多民族汇集的部队往往交流和沟通都是问题，甚至他们并不知道为什么而战，“为什么要为奥地利人而死？”这一传言在帝国军队的四周疯狂的宣传着，但是帝国无法作出更多的回答。奥匈帝国在一战一溃千里，甚至在和新生的波兰的冲突下被迫丢掉了百年前瓜分波兰的遗产，帝国的四周辽阔，他的四面皆敌，部队从来没能拧成一股绳，谁知道帝国下一次面临战争时，保护她的部队到底是她忠诚的士兵，还是那藏在身后的帮凶？"
Irreparable_national_problems: "无法挽回的民族问题"
Irreparable_national_problems_desc: "§7昔日民族的“大摇篮”，至少哈布斯堡人是这样想的，已经随着1913年匈牙利的叛乱和第一次世界大战的摧残，哈布斯堡的昔日美梦在残酷的现实下轰然破碎，面对长久的民族叛乱，貌似高高在上的哈布斯堡也无法做些什么，自从联邦化宣布失败，帝国的四周民族地区已经几乎完全自治，尽管哈布斯堡家族并不想这样，但是貌似奥匈帝国的内部问题已经将炸药包越拖越远，帝国已经到了最后的时刻……"
Failed_federalisation: "§R失败的联邦化"
Failed_federalisation_desc: "§Y我们无能无力\nThere's nothing we can do"
Nationalist_forces: "民族主义势力抬头"
Nationalist_forces_desc: "§7在北方，波兰已经宣称他们脱离了我们的实控，并且无不宣扬他们的“为了你和我们的自由”概念，我等臣民受此愚昧之言蛊惑甚多，在南方，新生的意大利磨刀霍霍，宣称着他们自古以来的领土，在边境，捷克人，匈牙利人，还有少数民族在撕裂着我们的帝国，1848年革命的遗产貌似在我国从未消逝，而是愈加愈旺盛。我等彻夜难安，怎敢想十年之事？"
