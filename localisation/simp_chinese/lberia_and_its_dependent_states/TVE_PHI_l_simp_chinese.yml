      PHI_bansang_isla:0 "众岛之国"
      PHI_bansang_isla_desc:0 "菲律宾，这片由七千余座岛屿缀成的群岛国度，其历史脉络与地理现实一样破碎而曲折。星罗棋布的岛屿不仅塑造了多样的语言与文化，也埋下了根深蒂固的地方主义与分离倾向的种子。西班牙近三百年的殖民统治，并未真正将其熔铸为一个整体，其治理往往依赖天主教会的渗透与地方精英的间接管理，这种“分而治之”的策略，在客观上保留了各地巨大的差异性。这也为菲律宾政府构建统一的菲律宾价值观造成了严重的困难，使得分离主义犹如一条毒蛇一般死死缠绕在这个岛国的脊梁上。"
      PHI_asian_outpost:0 "亚洲前哨"
      PHI_asian_outpost_desc:0 "当十九世纪初的独立浪潮席卷美洲，西班牙苦心经营三百年的庞大海外帝国分崩离析，其全球战略的支点便发生了根本性的转移。在失去了墨西哥的银矿与美洲大陆的广袤腹地后，偏居远东的菲律宾群岛，其战略意义从“跨太平洋贸易的利润中心”被重新定义为“帝国最后的尊严与前哨”，装备精良的西班牙海军太平洋舰队便驻扎于此。"

