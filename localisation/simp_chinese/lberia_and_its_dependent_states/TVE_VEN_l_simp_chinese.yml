      VEN_Miguel_Cavanellas:0 "米格尔·卡瓦内利亚斯"
      VEN_Eliazar_Lopez_Contreras:0 "埃利亚扎尔·洛佩斯·孔特雷拉斯"
      VEN_Eliazar_Lopez_Contreras_desc:0 "多年以后，当埃利亚扎尔·洛佩斯·孔特雷拉斯在总统府中为“小威尼斯”焦头烂额时，不知是否会想起与胡安·比森特·戈麦斯初见的那个午后。作为西班牙在拉美最重要的合作者，以及这个国家数十年独裁统治的继承者，孔特雷拉斯的日子并不轻松。他刚从统治一生的老独裁者戈麦斯手中接过权杖，尽管有西班牙支持，但老独裁者留下的权力阶级却仍根深蒂固，盘中错节。他不得不耗费心力去清理前任留下的残局。\n对外，“小威尼斯”亦如浪中扁舟。大哥伦比亚对这群“分裂者”恨之入骨，随时可能在阿根廷支持下挥师而来。而在世界眼中，他们不过是西班牙的新殖民地，日夜流淌着石油与人力的附庸。面对这些，扎特雷拉斯必须做出改变，他要世人明白，总有一天，小威尼斯将成为一个真正屹立于世的强大国家。"

