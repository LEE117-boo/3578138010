      VEN_shadow_of_the_past:0 "旧日阴影"
      VEN_shadow_of_the_past_desc:0 "在拉美独立浪潮席卷大陆后，小威尼斯共和国如同一枚被遗忘的旧日图钉，仍顽固地扎在南美洲的版图之上。其前身为西班牙殖民时期的格拉纳达总督区，却冠以共和之名，堪称历史的吊诡。对许多拉美人而言，它是革命未竟的象征，一道玻利瓦尔未能抚平的伤痕，在整体解放的叙事中，始终是一个突兀而沉郁的例外。"
      VEN_The_land_where_bgf:0 "黑金流淌之地"
      VEN_The_land_where_bgf_desc:0 "\n\n\n\n£GFX_idea_VEN_The_land_where_bgf_Pictures\n\n\n\n\n\n我国地下埋藏着令世界都震惊的巨量石油。在委里诺科重油带深处，亿万年沉积的黑色黄金以接近固体形态在砂石间凝固，仿佛一片被时光封印的石油之海。马拉开波湖古老的湖床下，则是另一重液态的深海——较轻的传统原油在不透水的岩盖下翻涌，在钻头抵达时喷薄出黑色的地火。这两种形态，一粘稠一如镜，构成了小威尼斯脚下最庞大也最沉重的沉睡财富。"
      VEN_on_ones_last_legs:0 "苟延残喘"
      VEN_on_ones_last_legs_desc:0 "\n\n\n\n£GFX_idea_VEN_on_ones_last_legs_Pictures\n\n\n\n\n\n在拉美独立浪潮席卷大陆后,小威尼斯共和国如同一枚被遗忘的旧日图钉，仍顽固地扎在南美洲的版图之上。其前身为西班牙殖民时期的格拉纳达总督区,却冠以共和之名，堪称历史的吊诡。对许多拉美人而言，这是玻利瓦尔的未竟之事，是旧世界套在美洲的最后一道枷锁。，无论付出多少代价，也要将这个所谓的共和国从地图上抹去。"
      VEN_Wolf_Lair_and_Fortress:0 "狼穴与堡垒"
      VEN_Wolf_Lair_and_Fortress_desc:0 "\n\n\n\n£GFX_idea_VEN_Wolf_Lair_and_Fortress_Pictures\n\n\n\n\n\n为拱卫海疆，我国与西班牙合作伙伴在漫长的边境线建立起被称为“南大西洋堡垒”的纵深防御体系。这道由永备工事、雷达哨所与机动火力构成的钢铁防线牢不可破。而在视线之外，另一项工程同步推进。为预警及化解外部威胁，情报机构在邻国境内秘密编织起一张特工网络，其核心枢纽被内部称为“狼穴”。通过资金渗透、政治颠覆与信息操控，持续威胁着邻国的政治生态。"

      

      