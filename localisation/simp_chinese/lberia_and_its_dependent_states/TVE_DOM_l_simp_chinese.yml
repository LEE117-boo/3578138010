    DOM_Hector_Trujillo:0 "埃克托尔·特鲁希略"
    DOM_Hector_Trujillo_desc:0 "1935年对埃克托尔来说本就是不平凡的一年，这一年初，一场小型屠杀席卷了特鲁希略城，但是 最终这场暴乱让西班牙人惊恐的害怕这个保护国失去控制，在西班牙的压力之下，特鲁希略辞职，将总统的位置让给了海军部长，弟弟埃克托尔。尽管名义上如此，但是实际上实权仍然掌握在公羊的手中。"
    DOM_Raphael_Trujillo:0 "拉斐尔·特鲁希略"
    DOM_Raphael_Trujillo_sl_desc:0 "\n\n\n§Y拉斐尔·特鲁希略§!\n\n\n\n\n\n\n\£leader_DOM_Raphael_Trujillo\n\n\n\n\n\n\n\n\n§Y拉斐尔·莱昂尼达斯·特鲁希略·莫利纳，、老大、大头目、大老板、ElJefe、祖国恩人、公羊、瓶盖狂人、教会造福者，多米尼加三军大元帅、前总统、陆海空军部长、大地和海洋的属于者，多米尼加党党魁、统帅、新领土之父、特鲁希略大元帅城和特鲁希略大元帅山的命名者§!\n§Y§!------------------------------------\n§L作为多米尼加最伟大的总统之一，特鲁希略出生于一个贫困家庭，小时因极爱收集瓶盖别在身上得名瓶盖狂人，之后上完小学便在电报局工作，随后加入了西班牙的治安部队作为西班牙的军官，他和西班牙统治者打下了坚实的基础关系，最终平步青云，当上了军区司令，不久既调任陆军总司令。\n1930年，总统巴斯克斯试图连任总统，遭到各方反对，在动乱之中，特鲁希略将“圣地亚哥革命”的成果窃取，并当上了总统，彼时正逢西班牙内战，无能为力的西班牙驻军对此毫无作为，甚至对此击掌相庆，因为他让这个国家摆脱了动乱。然而随着西班牙内战的结束和特鲁希略民族主义再此引起了不满，随后，特鲁希略被迫让位给他的弟弟埃克托尔，尽管如此，他仍然在幕后操盘一切，并密谋回归。§!"

    DOM_Black_person:0 "黑人"

    DOM_The_Feast_of_the_Ram:0"公羊的盛宴"
    DOM_The_Feast_of_the_Ram_desc:0 "\n\n\n\n£GFX_idea_DOM_The_Feast_of_the_Ram_Pictures\n\n\n\n\n\n陆军、海军部长，大元帅、祖国恩人拉斐尔·莱昂尼达斯·特鲁希略·莫利纳在1930年推倒了腐朽的政府上台，如今虽然他已经不担任共和国总统这一职位，但是他仍然是我国历史上的一个伟人，他为我国创造了伟岸的经济和基础建设，他镇压了企图扰乱国家的激进分子，特鲁希略大元帅万岁！\n§R我不想让你溺毙在西班牙殖民分子的梦魇之中§!\n§R我也不想让公羊在这个世界上逍遥§!\n§R神于天，特鲁希略于地府§!"
    DOM_spanish_influence:0 "西班牙影响度:适中"
    DOM_spanish_influence_desc:0 "也许这只被拔了牙的狮子没有攻击力了，但是1935香菜事件仍然告诉我们西班牙仍然可以对这个加勒比岛国发表一些意见。"
    DOM_spanish_influence_tt:0 "§Y我们与西班牙的关系评价互相:+30§!"
    DOM_The_Spaniards_wwhb:0 "掣肘的西班牙人"
    DOM_The_Spaniards_wwhb_desc:0 "\n\n\n\n£GFX_idea_DOM_The_Spaniards_wwhb_Pictures\n\n\n\n\n\n在上个世纪，杜桑将殖民者赶出海地时，岛屿的另一边，多米尼加仍然在西班牙的治理之下，如此一个世纪过去，圣多明各岛上的两个国家分道扬镳，多米尼加仍然保持着他原本的样貌。西班牙人在多米尼加的混血人看来仍然极其矛盾：一方面，他们授予了自治的权利，一方面又指使寡头和考迪罗大肆掠夺我国的资源，靠着自己的特权为所欲为。\n也许特鲁希略会更讨厌他们一些，除了对漂白计划的强行打断，也是他们对那些个傀儡总统试图染指，试图让特鲁希略被赶出共和国。"
    DOM_The_whitewashing_peif:0 "无疾而终的漂白计划"
    DOM_The_whitewashing_peif_desc:0 "\n\n\n\n£GFX_idea_DOM_The_whitewashing_peif_Pictures\n\n\n\n\n\n特鲁希略在执政初期便雄心勃勃的提出了一项漂白计划，该计划旨在对多米尼加国内的黑人进行系统性灭绝和清除，包括一些混血种人。但显然这项计划不切实际，尤其是西班牙人尤为反感这种破坏稳定以及对黑人占主导地位的海地赤裸裸的挑衅行为。于是，西班牙人紧急叫停了这项计划，并施压让特鲁希略辞职让位给他的弟弟埃克托尔，特鲁希略的算盘打空了。"
    DOM_Plans_for_the_wah:0 "对海地战争计划"
    DOM_Plans_for_the_wah_desc:0 "\n\n\n\n£GFX_idea_DOM_Plans_for_the_wah_Pictures\n\n\n\n\n\n海地，一个肮脏的加勒比小国，若不是迪克西老爷的撑腰，他们早已内斗成了一锅粥，尤其是最近美国局势不稳，据说撤军的谣言已经传出，而一些证据指明海地正在接触大哥伦比亚以换取新的保护！我们认识到圣多明各极其可能爆发一场战争，但是我们做好了准备，愿可以打倒他们。"