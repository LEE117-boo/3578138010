        POR_puppet_MZB:0 "葡萄牙海外殖民政府"

        MZB_Jose_Ricardo_Pereira_Cabral:0 "何塞·里卡多·佩雷拉·卡布拉尔"
        MZB_Jose_Ricardo_Pereira_Cabral_desc:0 "1879出生于拉梅戈的何塞卡布拉尔亲眼目睹了1910年成立的共和国和1921年复辟的王国。对参与过第一次世界大战的他来讲，他忠诚的并非某个领袖，而是葡萄牙这个国家本身。在大英帝国于一战末崩溃之后，葡萄牙趁机实现了粉色地图计划，接管了这位传统盟友在非洲的一些殖民地，这也带来了治理的当地不少问题。1926年他被任命为葡萄牙在非洲广袤殖民地的总督时，他就发誓要让这片土地成为祖国最温顺最有用的自治领，他以雷厉风行的风格用皮鞭和子弹消灭了这片土地上所有的抵抗组织，随着枪声在雨林中平静下来，坐在总督府办公室里的他也开始静下心来思考下一步行动方向。"

        MZB_Resistance:0 "雨林中的抵抗组织"
        MZB_expanding_colony:0 "扩张的殖民地"