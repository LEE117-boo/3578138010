    spain.6.t:0 "非法集会"
    spain.6.d:0 "巴塞罗纳大学，这座以深厚的历史底蕴享誉世界的古老学府如今却躺在残砖碎瓦中。\n内战把这座承载智慧的殿堂变成了最骇人的人间地狱，一间间教室化为废墟，一本本藏书烧为灰烬，一座座古老的建筑彻底湮灭于新世纪的炮火中。\n而这座大学里的人的命运也和这座大学一样，被滚滚向前的历史之轮碾为尘埃。\n佩德拉教授已经在巴塞罗那大学教授历史二十几年了，内战爆发时，他带着加载自己所有研究成果的笔记本和家人逃回了乡下老家。在颠沛流离中，他的妻子被叛军的飞机炸死，女儿死在共和军的炮火中。\n可他那些纸页已经泛黄的笔记本却毫发无伤……\n内战结束后，他回到巴塞罗那，却发现他过去熟悉的一切都已一去不复返。他过去任课的教室和他的办公室都化为尘埃，他的同事和学生们也不见踪影。没课上自然就没饭吃，为了生计，他租下一个街区外一间残破的小木屋当作教室看看能不能“拣”几个学生度日。功夫不负有心人，佩德拉居然等到了几个年轻的小伙子光顾他这几根破木板“糊”成的教室。他本想教他们简单的识几个字，可他发现这些年轻人的知识水平不低。于是佩德拉便和他们聊起了自己最爱的历史，他们从夜聊到明，从特拉斯塔马拉王朝聊到共和国，当他们谈起第二共和国那短暂而动荡的历史时。年轻的小伙子们好像心中燃起了一股无名火，他们挥舞着拳头，嘴中蹦出一些惊人的话语。\n“军人毁了共和国…”\n“我们一定要再次起来战斗…”\n“稳定才能压倒一切…”\n佩德拉很少干预他们的辩论只在局势可能失控时才下场干预\n佩德拉很享受这来之不易的时光。\n有一天，佩德拉像往常一样早早来到教室，可迎接他的不是学生们的问好而是几个穿着制服的军人。不安的情绪从佩德拉的脚直爬到头，他转身刚想走，一声严厉的呵斥就把他钉在了原地。\n“佩德拉先生，你涉嫌组织非法集会，请和我们走一趟吧”"
    spain.6.a:0 "“在教室里组织非法集会，你一定是说笑吧“"
    spain.7.t:0 "德里维拉的晚宴"
