l_simp_chinese:
    TVE_title_loc_SPR:0 "西班牙国"
    TVE_desc_loc_SPR:0 "当人们提起西班牙，浮现在脑海中的常是大航海时代的“日不落帝国”或是曾笼罩拉丁美洲的庞大殖民网络。然而辉煌早已褪色，一连串战争的冲击——三十年代战争、王位继承战争、七年战争、拿破仑入侵、卡洛斯内争以及第一次共和国的动荡——几乎将这个古老帝国推至崩溃边缘。\n但命运似乎并未彻底抛弃这片土地。1875年，阿方索十二世登基，以铁腕终结卡洛斯派的觊觎，平定叛乱，并颁布《1876年宪法》，确立议会民主制，由自由党与保守党轮番执政，维系政治平衡。此后，他着力于国家重建与军队整顿，同时为保住残存的海外领土，批准古巴与菲律宾成为自治领。在他统治下，西班牙仿佛重获生机。\n二十世纪初，欧洲战云密布。意大利的一声枪响引爆第一次世界大战，西班牙因拥有尚具实力的海陆军与若干殖民地，成为协约国与同盟国争相拉拢的对象。法国在摩洛哥问题上做出让步，终使西班牙投入协约国阵营。战争期间，西班牙不仅成为协约国的后方基地，派出志愿军赴西线参战，还配合英法进攻德国在非洲与东亚的殖民地。战后巴黎和会上，西班牙如愿获得整个摩洛哥，并与法国共分喀麦隆。\n战后西班牙经济一度腾飞，政治却陷入持续动荡。阿方索十三世治国乏力，反对势力悄然滋长，而摩洛哥殖民战争持续消耗国力，财政濒临崩溃。随后，席卷欧洲的经济危机如魔爪般袭来，高赤字与恶性通胀使王国政府摇摇欲坠。社会党人与左翼力量秘密集结，国王健康亦每况愈下。\n1931年4月14日，社会党人发动全国大罢工，国家几近瘫痪。加泰罗尼亚分离势力与无政府主义者乘机起事，宣布脱离马德里。阿方索十三世不愿国家陷入内战，宣布退位。然而强硬派军方随即实施军管，发动政变，坦克驶入马德里街头。几乎同时，左翼力量展开武装反抗，各地起义蜂起——西班牙内战爆发。\n三年血火之后，普里莫·德里维拉率领的民族主义力量获胜，西班牙从此步入独裁专制的漫长黑夜。"

    SPR_Miguel_Primo_Derivella:0 "米格尔·普里莫·德里维拉"
    SPR_Miguel_Primo_Derivella_desc:0 "当米格尔·普里莫·德里维拉将军在1931年那场流血的政变中接管西班牙时，这个饱受政局动荡和殖民地战争折磨的国家，似乎终于迎来了一位能挥舞军刀斩断乱麻的强人。他来自安达卢西亚的贵族家庭，在摩洛哥和殖民地的赫赫军功为他赢得了威望。国王阿方索十三世的默许，更让这次行动披上了拯救国家于危难的光环。他承诺用“国家、宗教、君主制”的铁腕配方，为西班牙带来秩序与稳定，一场自上而下的“手术”即将开始。\n上台之后，他立刻开启了与，社会党人无政府主义者和分离分子的肮脏战争，直到1934年11月，训练有素的摩洛哥非洲兵团踏进了叛乱者在加泰罗尼亚的最后一个据点时，这场血腥的内战才终于结束，而这位独裁者也真正的掌握了整个国家。只不过现在就有你西班牙的雄狮，已年近七旬，却仍然大权在握不肯放手，这无疑让人民在心中产生了一个巨大的疑问，独裁者之后又会是谁呢？"
