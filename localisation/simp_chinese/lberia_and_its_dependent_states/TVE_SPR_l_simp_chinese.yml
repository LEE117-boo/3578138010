    spain_news.1.t:0 "德里维拉之死"
    spain_news.1.d:0 "今日凌晨，国家元首、摄政王米格尔·普里莫·德里维拉在离开蒙克洛亚宫时遭极端民族主义分子枪击，经抢救无效身亡。内政部随后确认，袭击者属于一个反对君主制与现行体制的极端地下组织并且与CNT密切关联。当局已对该组织成员展开全面搜捕。同日下午，阿方索十三世国王之子胡安·德·波旁—波旁王子在议会大厦宣誓即位，尊号为“胡安三世”。在面向全国的首次演讲中，新国王以沉重语调谴责了“一切形式的暴力与极端主义”，并郑重承诺将引领西班牙“走向民族和解与政治现代化”。然而，新国王的民主化宣言在部分激进右翼及军方内部激起了强烈的疑虑与汹涌的暗流。前独裁者之子何塞·安东尼奥·普里莫·德里维拉所领导的长枪党，于当日傍晚在多个城市散发檄文，谴责刺杀是“对西班牙精神的背叛”，并誓言“将以钢铁般的意志，继承真正的民族主义事业，清除一切内外之敌”。\n与此同时，军队内部，特别是中下层军官与保守派高层中，普遍弥漫着为德里维拉复仇的激愤情绪。在托莱多的军事学院、巴塞罗那的驻军俱乐部，随处可见面色阴沉、群聚低语的军官。他们普遍认为，刺杀是“对国家权威的野蛮挑衅”，必须“以血还血，以牙还牙”。\n国际社会正在密切关注，这个饱经创伤的国家，是会走向和解与新生，还是再次滑入暴力的深渊。"
    spain_news.1.a:0 "黑云压城"