    SPR_The_smoke_of_battle_dissipated:0 "硝烟散去"
    SPR_The_smoke_of_battle_dissipated_desc:0 "我们现在接手的，是一个满目疮痍的国家。硝烟从加泰罗尼亚的山谷散去，在卡斯蒂利亚的平原上留下焦黑的弹坑。空气中不再有炮声，却弥漫着比火药更沉重的寂静那是饥饿、恐惧与难以消弭的对立。\n我看到一座废墟，不止是教堂的断壁和工厂的骨架。更深重的废墟，埋在人民的眼神里，藏在每一个被迫选边站队的家庭裂痕中。土地在等待犁头，而无数双手还残留着握枪的老茧。\n重建必须从明天破晓开始。"
    SPR_Pointed_at_with_a_gun:0 "被枪所指"
    SPR_Pointed_at_with_a_gun_desc:0 "内战结束后，枪口并未冷却。德里维拉将军将整个国家置于军事管制之下，所有省份的行政长官均由现役军官担任。警察与宪兵队拥有随时搜查与逮捕的权力，任何集会都需要军方批准。\n经济计划在陆军参谋部的会议室里制定。工厂的产量、铁路的调度、乃至主要作物的收购价格，都由穿着军装的人员决定。工会被解散后，工人的工资与工时由军方监督部门规定，罢工者按“军事叛乱”论处。\n街头巡逻的士兵有权检查任何人的证件。报纸刊登的内容需经过军事审查办公室盖章。大学里，教授若在课堂上提及被禁的意识形态，很快会接到征兵通知。这里的重建不是通过议会的法案，而是通过军令部的每日通告和无处不在的岗哨来推行。"
    SPR_Depressed_Country:0 "萧条之国"
    SPR_Depressed_Country_desc:0 "在西班牙的土地上，硝烟散去后的寂静比战争本身更令人窒息。经济危机的浪潮尚未退去，内战的创伤又深深刻入国家的肌理，将往日的生机撕裂成碎片。走进曾经的工业区，景象触目惊心：工厂大门紧锁，锈迹斑斑的钢铁骨架在连绵阴雨中扭曲变形，破碎的窗户像无数只空洞的眼睛，绝望地凝视着灰蒙蒙的天空。流水线彻底停摆，机器上积满了厚厚的灰尘，油渍早已干涸，仿佛时间在这里彻底凝固，连空气都弥漫着衰败的气息。"
    SPR_Enemy_in_the_Mountains:0 "山中之敌"
    SPR_Enemy_in_the_Mountains_desc:0 "内战结束后，胜利者书写历史，但山区里仍有笔尖之外的墨迹在流动。在西班牙北部和比利牛斯山脉的褶皱里，游击队像野草一样扎根。\n这些游击队被我方正式定性为“赤匪”、“红色匪帮”及“恐怖主义残余势力”。这些家伙由内战失败后流窜的武装分子与部分受国际颠覆思想煽动的本土极端分子构成，其成员藏匿于北部及比利牛斯地区的非法匪巢中，包括自行挖掘的洞穴、废弃矿道以及临时搭建的违章窝棚。我们确信其受到国外敌对势力的遥控指挥，企图颠覆国家合法政权，并持续对其进行必要的清剿与法律制裁，以保障国民安全与领土完整。"
    SPR_general_politics:0 "将军政治"
    SPR_Rusty_gear:0 "生锈齿轮"
    SPR_Rusty_gear_desc:0 "内战后的西班牙工业，如同一台庞大而锈蚀的机器。其核心部件——钢铁厂、造船坞和煤矿——在战争中受损严重，修复过程缓慢而低效。国家主导的投资并未带来技术革新，反而固化了陈旧的生产模式。许多工厂继续运转着二三十年代的老旧机床，齿轮在缺乏润滑的摩擦中发出刺耳的声响。\n整个工业体系就在这样的锈蚀与摩擦中空转。它消耗着国家的黄金储备与人民的劳动，却未能输出足以驱动繁荣的真正动力。当邻国的经济机器在战后飞速迭代时，西班牙的工业齿轮只是在自身的铁锈中，缓慢地磨损着。"
    SPR_dirty_war:0 "肮脏之战"
    SPR_dirty_war_desc:0 "独裁政权对巴斯克地区实行高压统治，剥夺其自治权，并禁止使用巴斯克语。作为回应当地的巴斯克民族分子纷纷成立抵抗组织，以暗杀和爆炸为主要手段开始对马德里方面的回应。\n我们的政权将对巴斯克抵抗组织的剿灭视为一场维护统一的战争。安全机构对少数族裔聚居区进行全面监控，任何集会或语言异动都可能招致逮捕。审讯室内允许采用“必要手段”获取情报，嫌疑人的供词往往在黎明前签署。\n作为报复，恐怖分子选择最易造成恐慌的方式。炸弹被放置在市场或车站，袭击对象从警察逐渐扩大到任何为政权服务的公务人员。他们不区分军装与便服，正如我们的清剿行动也不严格区分武装分子与同情者。"
    SPR_dirty_war_desc:0 "独裁政权对巴斯克地区实行高压统治，剥夺其自治权，并禁止使用巴斯克语。作为回应当地的巴斯克民族分子纷纷成立抵抗组织，以暗杀和爆炸为主要手段开始对马德里方面的回应。\n我们的政权将对巴斯克抵抗组织的剿灭视为一场维护统一的战争。安全机构对少数族裔聚居区进行全面监控，任何集会或语言异动都可能招致逮捕。审讯室内允许采用“必要手段”获取情报，嫌疑人的供词往往在黎明前签署。\n作为报复，恐怖分子选择最易造成恐慌的方式。炸弹被放置在市场或车站，袭击对象从警察逐渐扩大到任何为政权服务的公务人员。他们不区分军装与便服，正如我们的清剿行动也不严格区分武装分子与同情者。"
    SPR_Streamlining_administration:0"精兵简政"
    SPR_Streamlining_administration_desc:0 "我们的政权面临着军队日益臃肿与腐败的难题。战争结束后，大批军官凭借战功转入政府和国有企业，形成了盘根错节的利益集团。军费开支长期占据预算首位，而许多部队单位实际上已沦为安置冗员的虚衔。\n改革从精简编制开始。我们试图削减将军员额，合并冗余的军区指挥机构，并让部分军事产业转型民用。然而，每一次整编都遭遇无形的抵抗。被裁撤的番号往往以“战略预备队”的名义变相保留，裁减的军官则被调往新设立的闲职部门。采购装备与工程承包中的回扣链条，早已渗透到国防部各个层级。"
    SPR_An_inevitable_reform:0 "势在必行的改革"
    SPR_An_inevitable_reform_desc:0 "面对持续的衰退与国际孤立，我们的政权被迫调整方向。技术官僚被引入经济决策层，他们制定了“稳定计划”，逐步放宽部分国家管制，吸引外资并鼓励旅游业。比塞塔的汇率得以统一，部分国营企业开始尝试有限的效率核算。\n这些措施并非根本性的转向，而是在不触动政权根基的前提下，为经济机器注入有限的润滑剂。重工业与金融的核心利益依然由旧有集团把持，农业地产结构纹丝未动。改革带来了外汇和些许市场活力，却未能撼动那个庞大而低效的体系。"
    SPR_have_to_face:0 "不得不面对的"
    SPR_have_to_face_desc:0 "我们的政权将任何形式的自治诉求视为对国家统一的直接威胁。在少数族裔聚居区，地方政府完全由我们直接任命的军事长官控制，所有市政文件必须使用卡斯蒂利亚语签署。当地语言被禁止在学校、出版物及公开场合使用，违者按破坏国家文化统一论处。\n这种压制并未消除自治诉求，而是将其驱入地下。秘密的语言学校在深夜的地下室开课，被查禁的民歌以更隐蔽的方式传唱。当表面的顺从成为常态时，政权不得不面对一个事实：我们无法战胜它们，加泰罗尼亚与巴斯克的旗帜仍然在暗中飘扬。"
    SPR_The_Lion_in_His_Twilight_Years:0 "雄狮暮年"
    SPR_The_Lion_in_His_Twilight_Years_desc:0 "晚年的德里维拉已很少离开埃尔帕尔多宫。他的身体需要医疗小组全天候监护，每日清醒的时间在不断缩短。但国家机器的所有关键齿轮，依然被锁在他那只布满老年斑的手中。\n内阁名单的任免、军队晋升的最终裁决、乃至重要外交函件的措辞，仍需由他本人在病榻上以颤抖的笔迹签批。他将衰老的身体变成了权力的最后一道壁垒，任何关于权力交接的具体安排都被无限期推迟。身边的亲信们只能围绕着一个日渐沉默的老人。"

    SPR_post_war_reconstruction:0 "西班牙战后重建"
    SPR_post_war_reconstruction_desc:0"历经三年血火交织的内战，西班牙已是千疮百孔。曾支撑国家命脉的四大工业区——加泰罗尼亚、巴斯克、马德里与巴伦西亚——如今遍布断壁残垣，机床锈蚀，厂房空荡，铁路网如同被扯断的筋脉。大萧条的阴霾仍笼罩着这片土地，失业与饥荒在破碎的城镇间蔓延，昔日的机器轰鸣被痛苦的沉寂取代。\n作为战争的幸存者与胜利方，我们站在历史的残垣上，肩负的不仅是重建工厂与铁路，更是将这个濒临坠落的国度，重新托回世界强权之列。殖民地的动荡与国际间的虎视，皆催促我们必须行动一场针对工业骨架的重生计划，已迫在眉睫。"
    SPR_Suppression_of_guerrilla_operations:0 "镇压游击行动"
    SPR_Invest_in_industry:0 "投资工业"
    SPR_repair_port:0 "维修港口"
    SPR_Strengthen_ideological_propaganda:0 "加强意识形态宣传"
    SPR_Protect_peoples_livelihood:0 "保障民生"
    SPR_build_infrastructure:0 "修建基础设施"
    SPR_Strengthen_armaments:0 "加强军备"
    SPR_Foreign_aid:0 "来自外国的援助"
    SPR_our_choice:0 "继承人"
    SPR_our_choice_desc:0 "时至1935年，这个刚刚历经内战疮痍的国家，又一次站在了命运的岔路口。当年率领国民军走向胜利的领袖普里莫·德里维拉，如今已垂垂老矣，却仍紧紧攥着权柄不肯松手。然而，无论他多么不情愿，权力的交接已无法回避。在如今的西班牙，几股势力悄然崛起，无不窥伺着独裁者之后时代的最高权位——其中最为突出的三方，分别是：由独裁者之子何塞所领导的长枪党、被称为民主国王与开明君主的胡安·德·卡洛斯，以及西班牙最年轻的将军弗朗西斯科·佛朗哥。他们各自代表着一方力量，在暗流涌动中，角逐着这个国家的未来。"
    SPR_Like_father_like_son:0 "虎父无犬子(长枪党)"
    SPR_Order_returned_to_the_army:0 "秩序归于军队(军方)"
    SPR_God_Fatherland_and_His_Majesty:0"上帝，祖国与陛下(君主制)"

    spain.1.t:0 "围剿"
    spain.2.t:0 "现状"
    spain.2.d:0 "“下一位！”\n一位略显疲惫的中年男子走了进来，贝伦格尔一眼就认出这个该死的邻居贡萨洛，但他强忍着怒火，开始核查登记表上的信息。\n“姓名?”\n“贡萨洛·里巴多鲁，已婚。前游击队员，现德桑蒂利亚纳煤厂工人。家有一儿两女”\n一份提前切好的一千克面包和几个军用罐头被送到贡萨洛手里。贝伦格尔感受到这个往日的敌人正不时看向自己，那复杂的眼神中究竟是愤怒还是悲哀，贝伦格尔自己也说不清。\n“下一位！”\n工厂重新运转，人们试着回到从前的生活，西班牙正在恢复过来。但对贝伦格尔来说，未来毫无意义，他爱的所有事务都已经跟着旧日时光逝去，现在的他不过是行尸走肉。正当贝伦格尔漫不经心处理配给时，一阵急促的脚步声打断了他的思绪。抬头一看，贡萨洛那张令人厌恶的脸摆在他的眼前。贝伦格尔终于忍无可忍，摆着桌子站起来大喊：“先生，这就是一家四口正常的配给量。我们没有歧视任何一个人，哪怕曽为敌也是同胞！”\n“我知道。”贡萨洛并没有咒骂贝伦格尔。他泪流满面，跪倒在贝伦格尔桌前。“对不起…是我亲手杀死了你儿子…你杀了我吧！”\n贝伦格尔转过身去，颤抖着喊到：“拖出去！”他忍住回头的欲望看向窗外，看着商船再次驶过海岸，孩子们在弹坑里嬉戏，泣不成声。\n等到两个卫兵把贡萨洛拖出办公室，贝伦格尔才转过身来。望着眼前无数个熟悉而陌生的脸，他想到这些人中不少也是朋友，不久前也持枪相向。时间会治愈一切，而未来就在眼前，贝伦格尔这样想着。"
    spain.2.a:0 "“下一位！”"
