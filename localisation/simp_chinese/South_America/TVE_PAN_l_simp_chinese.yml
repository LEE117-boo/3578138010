        PAN_between_two_united_states:0 "在两个美国之间"
        PAN_between_two_united_states_desc:0 "§R我们虽然属于美利坚，但拥有的自治权利允许我们如此倒行逆施。§!\n有个西班牙语英语双语的美国笑话——运河的海军陆战队官兵都是带着两套制服，一套联盟国的，一套合众国的。因为我们离合众国实在是太远了，加上联盟国的所谓“黄金圈计划”，导致我国和联盟国也有一些接触，久而久之甚至会放行一些联盟国商船。"
        PAN_Countdown_to_Gran_Columbia:0 "大哥伦比亚的倒计时"
        PAN_Countdown_to_Gran_Columbia_desc:0 "§R大哥伦比亚的局势和我国息息相关。§!\n大哥伦比亚的局势目前看来仍然陷于暴乱和冲突，要随时做好保卫运河的准备，毕竟合众国那群道冒盎然的君子肯定不会管我们多少的。"