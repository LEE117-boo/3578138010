    CRC_Archibald_Currie:0 "阿奇博尔德·柯里"
    CRC_Archibald_Currie_desc:0 "1888年，阿里出生于苏里南，之后他前往海牙就读工程学。阿奇博尔德自在海牙完成他的学业之后便干起了他的测绘师工作，一直到那天。\n他被任命为地区专员，没有预告，没有预警，就那么来了，很多人相信因为他在当地的威望的缘故，亦有人说是他贿赂了殖民地，但无论如何，他进入了政坛，并在一战后一路高升，终于成为了总督。\n在荷兰自由放任的背景下，他得以放开拳脚，施展自己的自治理想，但目前而言，阻力显然很大。"
    CRC_Dutch_rule_in_name_only:0 "名存实亡的荷兰统治"
    CRC_Dutch_rule_in_name_only_desc:0 "荷兰统治我们3个世纪，在那场大战里，虽然荷兰未曾崩溃，但其的经济却元气大伤，并在战后的经济危机里蹒跚前行。我们抓住了这一时机，让荷兰的殖民者不在剥削我们，我们可以反到利用他们的经济和基础设施来建设苏里南这个小小的国度。"
    CRC_violence_and_peace:0 "暴力与和平"
    CRC_violence_and_peace_desc:0 "总督阿里在一些人眼里是合作者，妥协者，奸细，但他却利用荷兰的援助争取到了自治的权利，但在一些同胞看来，这背叛了他们争取独立的精神，一些人团结在苏里南工会前面，誓言要暴力推翻当前的苏里南总督，建立革命的独立共和国，至此为止，苏里南的道路何去何从?"
    CRC_native_governor:0 "土著总督"