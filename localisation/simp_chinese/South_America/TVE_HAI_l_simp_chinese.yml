        HAI_Dixies_Slave:0 "迪克西之奴"
        HAI_Dixies_Slave_desc:0 "§R除非更严重的威胁，否则美利坚联盟国将时刻关注海地§!\n1915年，迫于银行因为对海地的投资和太子港政府本身的愚钝，联盟国派遣了一只海军陆战队登陆了这个加勒比岛国，整个过程无比的顺利——海地被占领了。随后，联盟国在海地建立的制度引起了海地人极大规模抗议——佃农制度和庄园主，这引起了对美国统治的极大抗议。尽管如此，美国海地驻军仍然在贪婪的掠夺海地的一切，虽然美国的驻军及其的稀少，但是，肆意妄为仍然让联盟国无法容忍。"
        HAI_Crossing_the_Masak_River:0 "越过马萨克河"
        HAI_Crossing_the_Masak_River_desc:0 "得益于特鲁希略无疾而终的漂白政策，无数生活在多米尼加的黑人恐慌而又惊讶，正因如此，无数生活在公羊的淫威下的黑人翻山越岭通过偷渡的方式来到海地，但是管理他们却成为了一个及其头痛的难题，尤其是特鲁希略拒绝和我们进行外交会谈的情况下。"
        HAI_A_government_that_has_stalled:0 "停摆的政府"
        HAI_A_government_that_has_stalled_desc:0 "海地的政府运行一直是一个谜题，我是说在除去伏都教的各种仪式和海军陆战队之下的，和他们比起来海地政府的运行算是小巫见大巫了。也正因如此，海地的政权及其混乱，议会充斥着腐败和贿赂，军官政变频繁且平常，选举也成了极大的问题（因为总统需要议会选出），现任总统励志要清除此类害虫，还海地一个安定。"