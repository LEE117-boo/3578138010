l_simp_chinese:
        BRB_Hottolio_Vargas:0 "热图里奥·瓦加斯"
        BRB_Hottolio_Vargas_desc:0 "在瓦加斯8岁时，巴西内战波及到了南里奥格兰德，好在战争很快平息，瓦加斯未受到影响，他读完了大学，加入了巴西自由党，直到1923年，他因为拒绝支持党内统一路线被驱逐出党，他单独建立了巴西工党，其的民众主义思想和鼓动性的宣传吸引了大量选民，并成功在1930年当选总统。\n任期内，瓦加斯坚持自己的主义，将大普拉蒂尼代入了现代化国家，同时加强了和阿根廷的合作，为共建南锥体做出了表率。\n1934年，瓦加斯连任总统，但他的统治并非一帆风顺，暗处的几双眼睛已经盯紧了他。"

        

