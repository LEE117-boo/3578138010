l_simp_chinese:
        BOL:0 "秘鲁-玻利维亚联邦"
        BOL_DEF:0 "秘鲁-玻利维亚联邦"

        BOL_The_Apra_Party_is_rampant:0 "阿普拉党泛滥" 
        BOL_The_Apra_Party_is_rampant_desc:0 "\n\n\n\n£GFX_BOL_The_Apra_Party_is_rampant_Pictures\n\n\n\n\n\n1930年代组建的阿普拉党可谓臭名昭著，他们在国内无恶不作，另我们局势紧张，令人十分讨厌，不过这块顽固的胶水不是一天可以撕下来的。"
        BOL_military_extreme:0 "军队极端思想横流"
        BOL_military_extreme_desc:0 "§R这会引发很严重的后果§!\n如果秘鲁玻利维亚没有军队，那么这个安第斯群山之中的国家必然无法生存，但是，军队已经开始越来越极端化，不少人都信仰了法西斯主义和共产主义，这很不利于我们。"
        BOL_One_country_with_two_central_hubs:0 "一个国家，两个中枢"
        BOL_One_country_with_two_central_hubs_desc:0 "§R我们不能眼睁睁的看着国家陷入分裂§!\n如果说秘鲁玻利维亚是一个国家的话，那么秘鲁人、玻利维亚人都不会满意，自1839年联邦建立后，我们就有两个政府，这两个政府常年意见不合，比如如今玻利维亚布什将军就当众批评了秘鲁政府，这很不利于国家团结。"