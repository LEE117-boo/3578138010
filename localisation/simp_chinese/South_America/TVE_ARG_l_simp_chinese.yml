        ARG_The_controversial_royal_family:0 "饱受争议的王室"
        ARG_The_controversial_royal_family_desc:0 "\n\n\n\n£GFX_ARG_The_controversial_royal_family_Pictures\n\n\n\n\n\n1870年，达数十年的内乱结束后，我国最终邀请意大利的阿玛迪奥公爵来到阿根廷担任国王，这一决定似乎并不是十分明智，但在当时意大利移民的背下，似乎看起来像是一个英明的决定。\n国王在阿根廷的实权微乎其微，但是他也象征着阿根廷这个国家，王室在阿根廷绝对谈不上欢迎，尽管内的意大利人们向来对同为意大利裔的国王感到亲切，但本土的高乔克里奥尔人，以及共和派们感到了莫大的羞辱，假以时日，他将变成阿根廷重大隐患。"
        ARG_lost_prosperity:0 "失去的繁荣"
        ARG_lost_prosperity_desc:0 "\n\n\n\n£GFX_ARG_lost_prosperity_Pictures\n\n\n\n\n\n阿根廷在第一次世界大战前后的一段时间称之繁荣时代，那个时代阿根廷人均收入较高，全国洋溢着喜悦的味道，但随着全球经济危机来临，阿根廷维持的繁荣不再，尽管如今有所减缓，但们还是有些惆怅怀念那个繁荣的年代。\n自从征服荒野、开发巴塔哥尼亚、在一战中努力保持中立到一战结束，60年繁荣如泡影般破裂，化作银破产、军队抗议的一地鸡毛，令人感慨。"
        ARG_Military_political_rc:0 "军政关系矛盾"
        ARG_Military_political_rc_desc:0 "\n\n\n\n£GFX_ARG_Military_political_rc_Pictures\n\n\n\n\n\n在19世纪时期，当我们国家陷危机之时，必有一个强人站出来，组织军队建立稳固政府。但老罗加总统上任后，一切都变了，军政府在此后60年中未能出现，直到这次危机前。危机后军队东山再起，也许军政府会再一次出现在阿根廷的舞台上。\n1930年，军队强硬派的领袖乌里武鲁被撵出中央，这一思想似乎消散无形，但是他如一条跳动的线，牵扯着每一个军人的神经。"
        ARG_Roga_Saro_Agreement:0 "罗加-萨罗协议"
        ARG_Roga_Saro_Agreement_desc:0 "阿根廷迎来了经济的腾飞。\n随着1933年贸易协议的签署，阿根廷终于为自身的商业找寻到了新的出口，黎，波尔多和马赛代替了伦敦，多伦多与柏林，为阿根廷赖以为生的产业提供更大的市场与支持。在法国的支援下，阿根廷得到的远不止贸易：济管理模式的流入，人口的移民和技术的传播，都使阿根廷的工业和经济得到了建国以来再难获得的高速发展。\n然而，如同世界上的一切事务法兰西的支援并非没有代价：出入政府大楼的法国绅士，经济中心回荡的巴黎口音，甚至军队中逐渐增长的法国势力，都暗示出，这场交易远没对外报道般美好。\n但阿根廷别无选择。除了依赖法国，阿根廷已经不再有别的方法以实现复苏，尽管主权丧失，尽管法国的绳索越收越紧，但根廷只能接受这样的代价。作为南锥体的一叶孤舟，阿根廷无法与列强抗衡\更何况，阿根廷不是大卫，法国也未必是哥利亚。"
        ARG_Argentine_National_Oil_Company:0 "阿根廷国立石油公司"
        ARG_Argentine_National_Oil_Company_desc:0 "\n\n\n\n£GFX_ARG_Argentine_National_Oil_Company_Pictures\n\n\n\n\n\n自从荷兰家壳牌石油公司因为英国问题撤出阿根廷后，我国主要石油公司便变成了标准石油公司，1926年，国立石油公司建立，他大规模对外国石油公司行收购，为我国国有化石油做出了重要贡献。\n恩里克·莫斯科尼本来是一名空军飞行员，但他在1926年将国立石油公司管理的井井有条，但是明白，随着阿根廷石油需求的增大，这一场石油战争远没有结束。"
        ARG_Paraguay_Index:0 "巴拉圭指数：沸反盈天"
        ARG_Paraguay_Index_tt:0 "\n\n\n\n£GFX_ARG_Paraguay_Index_Pictures\n\n\n\n\n\n巴拉圭总督区的抵抗力度§R+15%§!"
        ARG_Paraguay_Index_desc:0 "自从查科战争我军入场消灭了巴拉圭之后，我国成立的巴拉圭总督区内就一直拥有大量抵抗运动，目前虽然抵抗的势头已经暂时被压制，但是随着时间推移，目标可能会变得越来越糟……\n当前总督是:§R巴勃罗·拉米雷斯§!\n§R巴拉圭屠§!\n\n\n\n\n\n\n\n£GFX_ARG_PAR_Pedro_Pablo_Ramirez_Pictures\n\n\n\n\n\n\n\n\n介绍：和其他几位在巴拉圭工作的将领一样，巴勃拉米雷斯也是军队强硬派的一员。甚至1913年以前，他还是德国军队的一员。在1930年乌里武鲁被赶出中枢之后，拉米雷斯的总参谋长便被罢职他很快也被赶到巴拉圭去进行管理。\n在巴拉圭的行动枯燥无味，但在1935年总督乌里武鲁被“自由巴拉圭运动”处死在亚松森郊外，他便成为了督，在总督任上，他大力组织军警和部队屠杀抗议者和游击队，建设集中营，双手沾满巴拉圭人的血，国际社会对此多有谴责，不过阿根廷方面来没有对此表示正确与否……"
        ARG_south_america_lighthouse:0 "南美灯塔"
        ARG_south_america_lighthouse_desc:0 "我们作为南美少数几个民主自由的王国，承担着神圣的使命，因此我们应该坚持这一底线。\n放眼片哥伦布发现的大陆，独裁和考迪罗的身影无处不在，他们对南美展开了折磨，来自欧陆和美洲的强权也对此攫取自己的利益。\n也许终有一日一个独立的南美将重现于世间，也许还要百年，也许就在今日。"

        Argentina_news.1.t:0 "阿根廷的吹哨人"
        Argentina_news.1.d:0 "在巴塔哥尼亚丑闻的数个星期里，阿根廷激进公民联盟陷入了几乎分裂的状态，但是令人惊讶的是，阿尔维亚尔并未被此事件打垮，他拉拢了数位将军并发动了一次自我政变，而愚蠢的国家民主党人士和冈萨雷斯相继被逮捕，阿尔维亚尔再一次屹立在阿根廷的舞台上。\n随后，国王发表了电视讲话，谴责了国家民主党的叛徒行为，称赞了阿尔维亚尔的果决，据传，关于国家民主党和冈萨雷斯派的审判将于几个星期内开始。"
        Argentina_news.1.a:0 "真是果决的行动"
        Argentina_news.2.t:0 "恩里克·马丁内斯接任首相"
        Argentina_news.2.d:0 "在巴塔哥尼亚的丑闻最终掀起了一场政变，随着军队的入场，事件变得不可控起来，在一阵危机和混乱之中，副首相恩里克马丁内斯登上了历史舞台，虽然国家已经进入了所谓紧急状态，但是马丁内斯还是取消了此件事情，此外，他还赦免了数位前公民军团的将领和参与人士。\n马丁内斯的举措让激进公民联盟内部及其不安，包括内政大臣奥尔蒂斯在内的多位成员谴责了其部分的举措，此外，阿古斯丁胡斯托将军宣称“拯救阿根廷的行为仍然没有结束”"
        Argentina_news.2.a:0 "让我们拭目以待"
        Argentina_news.3.t:0 "大统领的胜利"
        Argentina_news.3.d:0 "在埃皮迪里奥冈萨雷斯的一次失败夺权后，其人便消失在了公共视野当中，最近消息传来，冈萨雷斯由于自身身体原因已经辞去党内一切职务，并将此转交给青年才俊弗朗迪西，除此之外，他前往马丁·加西亚岛进行为期数周的度假。\n除此之外，阿尔维亚尔以国王的名义公布了一份材料，该材料谴责协作联盟在罗萨里奥、布宜诺斯艾利斯、门多萨等地进行选举舞弊和贿赂当地政客，并且将部分人民罗列其上。\n尽管如此，国家民主党和独立社会党对此仍然没有任何的解释和说明，但毫无疑问的，他们失去的争雄的资格。"
        Argentina_news.3.a:0 "激进公民联盟万岁(西班牙语)"
        Argentina_news.4.t:0 "奉天靖难"
        Argentina_news.4.d:0 "令人震惊的消息传来，来自巴拉圭总督区的驻防部队已经开离驻地，并且因为边防部队拒绝向他们开枪，他们已经突破了边境，向着布宜诺斯艾利斯开进。而在布宜诺斯艾利斯郊外，五月营同样发生了哗变，部队同样向着布宜诺斯艾利斯前进。\n我们不知道接下来发生了什么，因为接下来的电报已经中断，我们只能猜测军政府在施行新闻管制，本报记者于里约热内卢报道。"
        Argentina_news.4.a:0 "欧，天呐"
        