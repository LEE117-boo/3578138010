        ARG_Amedeo_II:0 "阿梅迪奥二世"
        ARG_Amedeo_II_desc:0 "体质差\n萨伏伊家族阿玛迪奥曾经是曼努埃尔一世的长子，当老国王于1931年驾崩后，他登上王位，是为阿玛迪奥世，尽管阿根廷国王是一个虚名，但是人民们依旧尊敬和尊崇他，愿上帝保佑他的身体健康和王位！"
        ARG_Amedeo_II_sl_desc:0 "\n\n\n§Y阿梅迪奥二世§!\n\n\n\n\n\n\n\£leader_ARG_Amedeo_II\n\n\n\n\n\n\n\n\n§Y名誉国王§!\n - 稳定度: §G+5%§!\n - 战争支持度: §G+5%§!\n-------------\n§L体质差\n萨伏伊家族阿玛迪奥曾经是曼努埃尔一世的长子，当老国王于1931年驾崩后，他登上王位，是为阿玛迪奥世，尽管阿根廷国王是一个虚名，但是人民们依旧尊敬和尊崇他，愿上帝保佑他的身体健康和王位！§!"
        ARG_Marcelo_Torquato_de_Alvial:0 "马塞洛·托尔夸托·德·阿尔维亚尔" 
        ARG_Marcelo_Torquato_de_Alvial_desc:0 "自从伊利戈延去世以后，党魁阿尔韦亚尔担任首相，他出生于阿根廷一个显赫的家族，早年曾经获得过布宜诺斯艾利斯大学博士位，后并加入了政府任多个职位并且加入了激进公民联盟。\n1932年，伊利戈延在即将结束自己首相任期的时候去世，经过选举，阿尔韦亚尔担了首相，不过他知道，§R收刀入鞘吧凡是持刀剑的，必死于刀剑之下§!"
        ARG_Marcelo_Torquato_de_Alvial_sl_desc:0 "\n\n\n§Y马塞洛·托尔夸托·德·阿尔维亚尔§!\n\n\n\n\n\n\n\£leader_ARG_Marcelo_Torquato_de_Alvial\n\n\n\n\n\n\n\n\n§Y政府首脑§!\n§Y一号首相:§!\n - 稳定度: §R-5%§!\n - 政治点获取: §G+15%§!\n-------------\n§L自从伊利戈延去世以后，党魁阿尔韦亚尔担任首相，他出生于阿根廷一个显赫的家族，早年曾经获得过布宜诺斯艾利斯大学博士位，后并加入了政府任多个职位并且加入了激进公民联盟。\n1932年，伊利戈延在即将结束自己首相任期的时候去世，经过选举，阿尔韦亚尔担了首相，不过他知道，激进公民联盟的执政时间已经过于长了，他也许无法独善其身的走下首相之位置。§!"
        ARG_Enrique_Ma_rtinez:0 "恩里克·马丁内斯"
        ARG_Enrique_Ma_rtinez_desc:0 "§R你爱恶胜似爱善，你爱说谎胜似爱说§!\n公义恩里克马丁内斯从来没思考过如今他居然当上了首相，这似乎令他极大的意外。他曾经和他们一起创立了激进公民联盟，曾经一起挥舞着手帕，一起见证民自治党的消亡和阿根廷那个是繁荣，最令人感叹的时代。\n但是，一切都变了，时代在往前，激进公民联盟也似乎将要消失，在这种氛围之下，马丁内斯想要抓取首相的宝座，他已经失去了他的美德，妄想着人们冲向五月广场，向伊利戈延去世时那样热烈\n但是，他已经失去了自己的内心，而命运，也将他随手抛弃。"
