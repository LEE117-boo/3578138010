         ARG_Amedeo_II:0 "阿梅迪奥二世"
         ARG_Amedeo_II_desc:0 "体质差\n萨伏伊家族阿玛迪奥曾经是曼努埃尔一世的长子，当老国王于1931年驾崩后，他登上王位，是为阿玛迪奥二世，尽管阿根廷国王是一个虚名，但是人民们依旧尊敬和尊崇他，愿上帝保佑他的身体健康和王位！"

         ARG_honorary_king:0 "名誉国王"

         ARG_The_controversial_royal_family:0 "饱受争议的王室"
         ARG_The_controversial_royal_family_desc:0 "\n\n\n\n£GFX_ARG_The_controversial_royal_family_Pictures\n\n\n\n\n\n1870年，长达数十年的内乱结束后，我国最终邀请意大利的阿玛迪奥公爵来到阿根廷担任国王，这一决定似乎并不是十分明智，但在当时意大利移民的背景下，似乎看起来像是一个英明的决定。\n国王在阿根廷的实权微乎其微，但是他也象征着阿根廷这个国家，王室在阿根廷绝对谈不上欢迎，尽管国内的意大利人们向来对同为意大利裔的国王感到亲切，但本土的高乔克里奥尔人，以及共和派们感到了莫大的羞辱，假以时日，他将变成阿根廷的重大隐患。"
         ARG_lost_prosperity:0 "失去的繁荣"
         ARG_lost_prosperity_desc:0 "\n\n\n\n£GFX_ARG_lost_prosperity_Pictures\n\n\n\n\n\n阿根廷在第一次世界大战前后的一段时间称之为繁荣时代，那个时代阿根廷人均收入较高，全国洋溢着喜悦的味道，但随着全球经济危机来临，阿根廷维持的繁荣不再，尽管如今有所减缓，但我们还是有些惆怅怀念那个繁荣的年代。\n自从征服荒野、开发巴塔哥尼亚、在一战中努力保持中立到一战结束，60年繁荣如泡影般破裂，化作银行破产、军队抗议的一地鸡毛，令人感慨。"
         ARG_Military_political_rc:0 "军政关系矛盾"
         ARG_Military_political_rc_desc:0 "\n\n\n\n£GFX_ARG_Military_political_rc_Pictures\n\n\n\n\n\n在19世纪时期，当我们国家陷入危机之时，必有一个强人站出来，组织军队建立稳固政府。但老罗加总统上任后，一切都变了，军政府在此后60年中未能出现，直到这次危机之前。危机后军队东山再起，也许军政府会再一次出现在阿根廷的舞台上。\n1930年，军队强硬派的领袖乌里武鲁被撵出中央，这一思想似乎消散于无形，但是他如一条跳动的线，牵扯着每一个军人的神经。"
         ARG_Roga_Saro_Agreement:0 "罗加-萨罗协议"
         ARG_Roga_Saro_Agreement_desc:0 "阿根廷迎来了经济的腾飞。\n随着1933年贸易协议的签署，阿根廷终于为自身的商业找寻到了新的出口，巴黎，波尔多和马赛代替了伦敦，多伦多与柏林，为阿根廷赖以为生的产业提供更大的市场与支持。在法国的支援下，阿根廷得到的远不止贸易：经济管理模式的流入，人口的移民和技术的传播，都使阿根廷的工业和经济得到了建国以来再难获得的高速发展。\n然而，如同世界上的一切事务，法兰西的支援并非没有代价：出入政府大楼的法国绅士，经济中心回荡的巴黎口音，甚至军队中逐渐增长的法国势力，都暗示出，这场交易远没有对外报道般美好。\n但阿根廷别无选择。除了依赖法国，阿根廷已经不再有别的方法以实现复苏，尽管主权丧失，尽管法国的绳索越收越紧，但阿根廷只能接受这样的代价。作为南锥体的一叶孤舟，阿根廷无法与列强抗衡\更何况，阿根廷不是大卫，法国也未必是哥利亚。"
         ARG_Argentine_National_Oil_Company:0 "阿根廷国立石油公司"
         ARG_Argentine_National_Oil_Company_desc:0 "\n\n\n\n£GFX_ARG_Argentine_National_Oil_Company_Pictures\n\n\n\n\n\n自从荷兰皇家壳牌石油公司因为英国问题撤出阿根廷后，我国主要石油公司便变成了标准石油公司，1926年，国立石油公司建立，他大规模对外国石油公司进行收购，为我国国有化石油做出了重要贡献。\n恩里克·莫斯科尼本来是一名空军飞行员，但他在1926年将国立石油公司管理的井井有条，但是他明白，随着阿根廷石油需求的增大，这一场石油战争远没有结束。"
         ARG_Paraguay_Index:0 "巴拉圭指数：沸反盈天"
         ARG_Paraguay_Index_tt:0 "\n\n\n\n£GFX_ARG_Paraguay_Index_Pictures\n\n\n\n\n\n巴拉圭总督区的抵抗力度§R+15%§!"
         ARG_Paraguay_Index_desc:0 "自从查科战争我军入场消灭了巴拉圭之后，我国成立的巴拉圭总督区内就一直拥有大量抵抗运动，目前虽然抵抗军的势头已经暂时被压制，但是随着时间推移，目标可能会变得越来越糟……\n当前总督是:§R巴勃罗·拉米雷斯§!\n§R巴拉圭屠夫§!\n\n\n\n\n\n\n\n£GFX_ARG_PAR_Pedro_Pablo_Ramirez_Pictures\n\n\n\n\n\n\n\n\n介绍：和其他几位在巴拉圭工作的将领一样，巴勃罗拉米雷斯也是军队强硬派的一员。甚至1913年以前，他还是德国军队的一员。在1930年乌里武鲁被赶出中枢之后，拉米雷斯的总参谋长便被罢职，他很快也被赶到巴拉圭去进行管理。\n在巴拉圭的行动枯燥无味，但在1935年总督乌里武鲁被“自由巴拉圭运动”处死在亚松森郊外，他便成为了总督，在总督任上，他大力组织军警和部队屠杀抗议者和游击队，建设集中营，双手沾满巴拉圭人的血，国际社会对此多有谴责，不过阿根廷方面从来没有对此表示正确与否……"
         ARG_south_america_lighthouse:0 "南美灯塔"
         ARG_south_america_lighthouse_desc:0 "我们作为南美少数几个民主自由的王国，承担着神圣的使命，因此我们应该坚持这一底线。\n放眼这片哥伦布发现的大陆，独裁和考迪罗的身影无处不在，他们对南美展开了折磨，来自欧陆和美洲的强权也对此攫取自己的利益。\n也许终有一日，一个独立的南美将重现于世间，也许还要百年，也许就在今日。"