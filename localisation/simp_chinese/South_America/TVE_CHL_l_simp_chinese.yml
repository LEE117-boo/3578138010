   CHL_The_defeat_in_the_Pacific_War:0 "太平洋战争的失败"
   CHL_The_defeat_in_the_Pacific_War_desc:0 "\n\n\n\n£GFX_CHL_The_defeat_in_the_Pacific_War_Pictures\n\n\n\n\n\n鸟粪战争被证明是一场大耻辱：我们先进的装备却一头撞死在了秘鲁玻利维亚的铁壁之上，尽管他们也十分勉强的惨胜了这场战斗，但是我们失败了，此后数十年，我们一直掩盖在这层阴霾之中"
   CHL_Patagonia_Affairs_Bureau:0 "巴塔哥尼亚事务局"
   CHL_Patagonia_Affairs_Bureau_desc:0 "\n\n\n\n£GFX_CHL_Patagonia_Affairs_Bureau_Pictures\n\n\n\n\n\n欧，好吧，尽管智利人仍然认为巴塔哥尼亚就是一片鸟不拉屎的高原，但是事实上，这里隐藏着石油、矿产、机遇。成立于1900年的事务局便是统筹这里的事务的领导，尽管地方势力仍在负隅顽抗，但是这片智利共和国的土地只会更加繁荣。"
   CHL_glimmer_of_democracy:0 "民主微光"
   CHL_glimmer_of_democracy_tt:0 "民主主义支持度:§C+10§!"
   CHL_glimmer_of_democracy_desc:0 "\n\n\n\n£GFX_CHL_glimmer_of_democracy_Pictures\n\n\n\n\n\n南美从来不是什么民主的沃土，从阿根廷王国到秘鲁玻利维亚联邦，从巴西帝国到大哥伦比亚，显然他们都是在考迪罗、寡头地主、外国资本主义侵略之下苦苦挣扎。但是智利不同，亚历山德里总统执政的十几年里，智利显然在南美中一枝独秀，我们要继续维持！"

   CHL_Arturo_Alessandri:0 "阿图罗·亚历山德里"
   CHL_Arturo_Alessandri_desc:0 "如果要评选智利总统中最厉害的不倒翁，亚历山德里总能一骑绝尘，无论如何，在20世纪的初四十年里，他执政了四分之一的时间\n在上个世纪末，他参加了自由党，并在几次政治危机中全身而退，随后又被推举当选，“他总是这样”一位议员如是说。\n如今，自1932年任期已经过去了4年，他依旧挺立在总统的位置上。"
   CHL_Pedro_Abelino_Aguirre_Cerda:0 "佩德罗·阿贝利诺·阿吉雷·塞尔达"
