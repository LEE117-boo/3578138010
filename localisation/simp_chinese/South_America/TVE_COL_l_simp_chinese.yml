    COL_The_legacy_and_aotgm:0 "盖坦运动的遗产和遗波" 
    COL_The_legacy_and_aotgm_desc:0 "\n\n\n\n£GFX_idea_COL_The_legacy_and_aotgm_Pictures\n\n\n\n\n\n1933年，当军官因为不满哥伦比亚自由党的关于军费的变革，冲入波哥大准备使用武力颠覆国家秩序之时，盖坦领导的左翼运动拯救了共和国，工人和佃农发起了大罢工，切断了军政府的命门，随后全国左翼联盟和自由党一起回到了波哥大，扑灭了这一团烈焰。这件事让全国左翼联盟获得了无与伦比的威望，尽管它随后便回到了自由党之中。1934年，普马雷霍和盖坦的党内选举竞争以盖坦完胜而告终，并赢得了总统大选，盖坦运动胜利了，波哥大人民和全大哥伦比亚的人民都很高兴，但是来自遍布哥伦比亚的大农场主和庄园主显然对此极其不高兴。\n好吧，不可否认的是，左翼运动让我们留下了一大堆烂摊子，以及暴怒的地主阶级，如何平复他们的心情，或者碾碎他们，都是下一步需要考量的问题。"
    COL_divided_house:0 "分裂之家"
    COL_divided_house_desc:0 "\n\n\n\n£GFX_idea_COL_divided_house_Pictures\n\n\n\n\n\n§R你知道世界上三个最蠢的人是谁吗？耶稣基督、堂吉诃德、和我§!\n大哥伦比亚的粘合剂已经开始脱落，数十代总统的心血恐付诸东流，我们一手早就的联邦共和国的伟大基业似乎正在慢慢被凿空，来自各地的庄园、地主、农场主正在腐蚀我们这个共和国的基础，他们指着分裂，却说那是自由，他们指着暴乱，却说那是伟大。\n巴拿马的游击队、委内瑞拉的小威尼斯人、厄瓜多尔的煽动者，哪一个不是残忍卑劣狡诈之徒，哪一个不是可以和恶魔比肩的乱党，是时候剿灭他们了。"
    COL_divided_house_2:0 "分裂之家"
    COL_divided_house_2_desc:0 "\n\n\n\n£GFX_idea_COL_divided_house_Pictures\n\n\n\n\n\n§R你知道世界上三个最蠢的人是谁吗？耶稣基督、堂吉诃德、和我§!\n大哥伦比亚的粘合剂已经开始脱落，数十代总统的心血恐付诸东流，我们一手早就的联邦共和国的伟大基业似乎正在慢慢被凿空，来自各地的庄园、地主、农场主正在腐蚀我们这个共和国的基础，他们指着分裂，却说那是自由，他们指着暴乱，却说那是伟大。\n巴拿马的游击队、委内瑞拉的小威尼斯人、厄瓜多尔的煽动者，哪一个不是残忍卑劣狡诈之徒，哪一个不是可以和恶魔比肩的乱党，是时候剿灭他们了。"
    COL_Fulfilling_Bolivars_last_wish:0 "完成玻利瓦尔的遗愿"
    COL_Fulfilling_Bolivars_last_wish_desc:0 "\n\n\n\n£GFX_idea_COL_Fulfilling_Bolivars_last_wish_Pictures\n\n\n\n\n\n在百年之前，国父玻利瓦尔战略转移出加拉加斯，但是西班牙殖民者最终加固了这处老巢，我们再也没有回到这片我们朝思梦想的土地，我们也几乎失去了加勒比的出海口。\n但是，今时不同往日，大哥伦比亚正在用一种全新的面貌走来，这一次，我们来算总账了！把西班牙殖民者自己的头颅高高挂在那玻利瓦尔的坟墓上谢罪！大哥伦比亚万岁！"
    COL_Cooperation_between_baa:0 "哥阿合作"
    COL_Cooperation_between_baa_desc:0 "\n\n\n\n£GFX_idea_COL_Cooperation_between_baa_Pictures\n\n\n\n\n\n§C瓜亚基尔国际为两国提供了科技合作§!\n自拉普拉塔的平原至波哥大的山脉，自玻利瓦尔城的涓涓细流到大西洋的磅礴海浪，我国本和阿根廷一衣带水，确情深似海。\n天各一方的朋友的确如此，而我们确实也志同道合，共同抵御着那西班牙匪徒重新夺走拉美独立的白日梦。"
    COL_Do_not_train_the_border:0 "不训边境"
    COL_Do_not_train_the_border_desc:0 "\n\n\n\n£GFX_idea_COL_Do_not_train_the_border_Pictures\n\n\n\n\n\n大哥伦比亚的边境一直以来便等同于虚线——因为在别的国家眼里，我们的国境可以随意侵犯，这简直是奇耻大辱！因此，在盖坦总统上台后，利用普及教育的机会对我国地图进行了重新绘制，拿回本就属于我们的领土，这却令这些独裁专制国家极其不满，他们狡辩说我们对他们的领土起贪念，我们对此大为鄙夷，不过暂时这些事情也不能发作，因为国内的烂摊子还没处理完呢…"
    COL_Do_not_train_the_border_tt:0 "[BRA.GetFlag]§Y[BRA.GetName]§!对我国的评价: §R-50§!\n[BOL.GetFlag]§Y[BOL.GetName]§!对我国的评价: §R-50§!\n[GYA.GetFlag]§Y[GYA.GetName]§!对我国的评价: §R-50§!\n"


    colombia.1.t:0 "盖坦的演讲"
    colombia_news.1.t:0 "盖坦遇刺身亡"
    colombia_news.1.d:0 "全世界的目光都集中在大哥伦比亚:盖坦死了。\n在波哥大对支持者和民众发表新年演讲时，一名刺客混入了人群，他掏出了手枪，对着盖坦连开三枪，盖坦随即便倒地不起，尽管医生尽力抢救，但在1月1日的清晨，他还是去世了。也许是因为政敌报复，也许是右翼恐怖分子的作祟，甚至也有大量的人将矛头对准联盟国和西班牙，但是无论如何想，盖坦已经去世，而临时接管政府的大哥伦比亚联邦共和国国民议会正在尽力控制已经失控的局势。"
    colombia_news.1.a:0 "真野蛮"
    colombia_news.2.t:0 "大哥伦比亚内战"
    colombia_news.2.d:0 "盖坦去世之后，大哥伦比亚的矛盾彻底被引爆，无数群众动用私刑处决庄园主，工会再一次发起了大罢工，同时，政府军纷纷倒向自己忠诚的势力，社会主义党正在组建民兵，保守党的议员已经集体离开了席位——局势已经被引爆了。与此同时，玻利瓦尔的理想已经摔得粉碎，分离主义势力齐上阵，撕扯着共和国的皮肉，共和国已经彻底迈进了坟墓。小威尼斯方面暂时未发表任何评论"
    colombia_news.2.a:0 "不知道阿根廷做何感想"