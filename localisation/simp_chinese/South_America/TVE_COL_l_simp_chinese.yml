    COL_Jorge_Elisel_Gaitan:0 "豪尔赫·埃利塞尔·盖坦"
    COL_Jorge_Elisel_Gaitan_desc:0 "骗子、恶霸、赤色匪徒，这些都是关于盖坦的评价，在另一方面，他也有穷人之父、工人之子、道德和民主的卫道士等称号，他被誉为地狱的恶魔，又被称为“我们这个时代最伟大的人”和政府中的自由派们一样，盖坦生于20世纪的最初几年的波哥大，随后便考入了大学，并前往罗马等地深造。回国后，他踏入政坛，并在1929年的种植园大罢工中第一次接触到了人群，他也第一次亲眼见到了种植园农场主的残暴不仁，寡头资本的黑暗。他退出自由党，创建了左翼联盟，吸引了一大批左翼人士。\n1930年代对于哥伦比亚来说是一个疯狂的年代，先是和秘鲁玻利维亚的边境冲突几乎葬送了自由党的声誉，几乎使边境后退了百里；接着是保守党的改组，自由党的地位已经岌岌可危。阿尔弗雷多·巴斯克斯领导的军官联盟哗变导致的进军波哥大是压死骆驼的最后一根稻草，政府仓皇而逃，而在左翼联盟领导的工会却异军突起，用大罢工压下了军官的怒火，随着忠诚派的回归，联邦共和国保住了。\n盖坦也因此获得了无与伦比的威望，并在1934年众望所归当上了总统，1935年，他已经当了一年的总统，所有人都在憧憬一个崭新的共和国……"
    COL_National_Assembly:0 "大哥伦比亚国民议会"
    COL_Plinio_Mendoza_Nera:0 "普利尼奥·门多萨·内拉"
    COL_Plinio_Mendoza_Nera_desc:0 "出生于哥伦比亚最伟大学者家族普利尼奥的孩子，普利尼奥·门多萨·内拉是委内瑞拉和哥伦比亚两地的乡民，他也是§R盖坦§!最青睐的副手。\n在委内瑞拉的工作结束之后，他回到了§H波哥大§!，并参加了左翼革命，他最后被任命为教育部长，他发誓自己将为革命献出最后一滴血。"
    COL_Louis_A_Rozzo:0 "路易斯·A·罗佐"
    COL_Gilberto_Vieira_White:0 "吉尔伯托·维埃拉·怀特"
    COL_Romulo_Ernesto_Betancort_Bello:0 "罗慕洛·埃内斯托·贝坦科尔特·贝略"

