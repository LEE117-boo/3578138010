    BRA_Pedro_III:0 "佩德罗三世"
    BRA_Pedro_III_desc:0 "佩德罗·德·阿尔坎塔拉，即承上帝恩典及人民一致拥戴，巴西立宪皇帝与永久保卫者，唐·佩德罗三世，巴西的第四任皇帝\n他即位在最混乱的时期，在贝尔纳德斯时期，猖狂的共和派利用自己的爪牙疯狂攫取战争，而共产党和他们沆瀣一气，将巴西帝国搞的乌烟瘴气。但是，佩德罗三世缺乏治国的手段，相比于他的弟弟，他更加软弱和无能，名声也比他母亲伊莎贝拉一世要差，而巴西这艘船驶向的方向，也变得不可控起来……"
