    BRA_The_tyranny_of_mac:0 "牛奶和咖啡的专制"
    BRA_The_tyranny_of_mac_desc:0 "\n\n\n\n£GFX_idea_BRA_The_tyranny_of_mac_Pictures\n\n\n\n\n\n第二帝国的政治似乎比较枯燥无味亦或者称作简单“牛奶和咖啡的专制”顾名思义就是巴西两个最有权利的州米纳斯吉拉斯和圣保罗在巴西轮流执政，这是巴西州权的平衡。§R但是，谁打碎的这一平衡，巴西便会陷入不可预测的后果，我们能承担吗？§!\n§G巴西不需要这么多州，其实只要两个就够了—米纳斯吉拉斯州和圣保罗州\n————若昂·古拉特§!"
    BRA_Inflated_states_rights:0 "膨胀的州权"
    BRA_Inflated_states_rights_desc:0 "\n\n\n\n£GFX_idea_BRA_Inflated_states_rights_Pictures\n\n\n\n\n\n州权的力量自巴西建国以来便如同脱缰野马般不可控制，各州有自己的算盘和需求，以及各种特权，巴西的国家便掌握在州权手中，除了两个大州掌握政府，其余各州俨然已经变成了土皇帝，割据一方，尾大不掉"
    BRA_Arrogant_Republicans:0 "嚣张的共和派"
    BRA_Arrogant_Republicans_desc:0 "\n\n\n\n£GFX_idea_BRA_Arrogant_Republicans_Pictures\n\n\n\n\n\n共和派是自1888年废黜奴隶制后一股异军突起的势力，他们在各地煽风点火，兴风作浪，我国的稳定遭受了严重破坏，这导致了严重的社会问题，更大的问题是我们南方的共和党人如鲠在喉，且他们得到了阿根廷猪猡的支持。"
    BRA_unitary_economy:0 "单一的经济"
    BRA_unitary_economy_desc:0 "\n\n\n\n£GFX_idea_BRA_unitary_economy_Pictures\n\n\n\n\n\n随着严重的经济问题，我国过于依赖橡胶和咖啡的经济遭到了反噬，大量种植园农场主破产和倒闭，雪上加霜的是，愚蠢的圣保罗派的只顾自己保护圣保罗的利益，这导致其他地区的灾情更加严重。"