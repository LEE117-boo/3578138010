    TFE_title_loc_CSA:0 "           美利坚联盟国"
    TFE_desc_loc_CSA:0 "§R「内战之起」§!\n1861年2月5日，在林肯提出解放生产力并废除奴隶制，南方种植园内的白人奴隶主逐渐产生了不满情绪，林肯的工业化与民主决策破坏了南方种植园经济与自主权，隔日由南方7个蓄奴州宣布脱离美利坚合众国后建立新政权“南方联盟”，并由杰斐逊·戴维斯出任首任总统。\n在1862年7日战役中，罗伯特李将军在“半岛战役”中不仅击退了麦克莱伦的部队，更利用北军士气低落与情报失误分兵突袭了华盛顿特区外围，这次战役虽未攻陷其首都，但严重动摇了北方信心，延长了战争预期。\n而在葛底斯堡战役中，朗斯特里特遵循了命令更早地发动了骑兵进攻，这场战役被称为“葛底斯堡大反攻”的经典战役也被后人传颂，这场战役不仅是南军击溃了北军主力，还使西部防守的北军被迫撤回华盛顿回防，此战彻底粉碎了北军征服李世满的希望极大，提振了南军士气。\n随后在1864年的总统大选中，林肯因战场失利、经济大危机和验证情绪的共同作用下，麦克莱伦以和平谈判为纲领，给这场内战画上了句号，标志着北方主战派的彻底失败。\n§R「转型与西部威胁」§!\n经济从内战结束后开始从单一农业转向多元化，但棉花出口仍占联盟国的主导地位，石油和矿产业在德克萨斯与新墨西哥州兴起，并引起了众多德国投资者。\n而在中央经济崩溃的第二年里，联盟国临时政府宣布通过了《斯克达威亚法案》，推行公共工程，在之后的日子里在西部的郊区建立了更加先进化的黑人奴隶买卖处与中转站。\n1893年起，联盟国大力在三国交界处设立边境检查站和流放劳改营，至此，许多国家的难民都被流放至此，黑市腐败问题也成为了一大困处，至此这一“三不管”地带成为了法律真空区，不断吸引流亡者同机者和原住民部落并逐渐演变为自治社区与民兵武装。\n§R「邦联的未来」§!\n至1935年，联盟国领土相对稳定，但国际孤立局势加剧，国内改革呼声高涨，考夫林神父成功当选新任总统后，便开始进行政治体制改革与加强中央管理的尝试，但在看似团结的联盟内，统一邦联党内的派系逐步分化成以休伊朗为首的改良派和与威廉亨利为首的自由派，每一个迪克西人都无法幸免。\n§R「主权的利剑」§!\n自1871年大宪法改革后，宪法规定“各州民兵为国防主体”，导致联邦常备军，规模极小主要职能为军官培训与边境要塞驻防。\n内战中的功勋将军杰克逊的旧部逐渐形成特权集团并垄断了中下层军官职位压制改革声音\n根据最新出台的《黑人劳工兵团法》规定，国家允许征召黑人进入非战斗岗位，如工兵，运输等穿着统一制服但无武器，所以通常被白人军视为“国家财产”，而非正规军队"
    
    CSA_Charles_Coughlin:0 "查尔斯·考夫林" 
    CSA_Charles_Coughlin_desc:0 "早年的考夫林先生作为一名神父信奉天主教，并且在佐治亚州和路易斯安那州拥有了很广泛的 民众基础，1932年时在教徒和部分被收买的奴隶主的支持下成功当选佐治亚州邦联议员，并在接下来的一年中取得多项政绩，并 通过著名的“迪克西电台”传播民粹思想和南方爱国主义精神，这种思想大受欢迎并拉拢了众多南方庄园主和农民，使其名声大   噪，后在被亨利提名并通过了邦联政府大选考验，成为美国南方最有名气的政治家兼宗教领袖。"
    CSA_Hugh_Long:0 "休伊·朗"
    CSA_Placeholder:0 "占位"
    
    
    CSA_slave_and_industry:0"奴隶与工业化"
    CSA_slave_and_industry_desc:0"\n\n\n\n£GFX_CSA_slave_and_industry_Pictures\n\n\n\n\n\n在第一次美国内战之后的日子里，奴隶制与现代工业化的冲突日益明显，在加州，许多旧庄园主和蓄奴人依旧在乡村和城市郊区从事着黑暗的奴隶买卖；而在费城与里士满，工业化的浪潮正逐步吞没落后的田园区，而工业与农业的发展矛盾逐渐演变成了邦联大会上的政治问题……"
    CSA_slave_and_industry_2:0"奴隶与工业化"
    CSA_slave_and_industry_2_desc:0 "\n\n\n\n£GFX_CSA_slave_and_industry_Pictures\n\n\n\n\n\n在第一次美国内战之后的日子里，奴隶制与现代工业化的冲突日益明显，在加州，许多旧庄园主和蓄奴人依旧在乡村和城市郊区从事着黑暗的奴隶买卖；而在费城与里士满，工业化的浪潮正逐步吞没落后的田园区，而工业与农业的发展矛盾逐渐演变成了邦联大会上的政治问题……"
    CSA_west_slave_baodong:0"西部奴隶暴动"
    CSA_west_slave_baodong_dm:0"西部奴隶暴动"
    CSA_west_slave_baodong_desc:0"自从伦敦经济危机和里士满条约签订后，北部与首都四周的部分黑人奴隶在名义上获得了解放，但这项政策改革后引起了大会内众多传统迪克西派和奴隶主的巨大不满。\n\n在震惊整个全国的“40”事件(庄园内黑奴爆发反剥削抗议，共有40名黑人奴隶被白人公开处死）后，引起了全国性的黑人奴隶暴动，最严重的便是西部洛杉矶城和路易斯安那州等地，与此同时北方的杨基势力和共产主义者趁机在西部进行了渗透，部分黑人奴隶自愿组成了“黑人自由军”以对抗邦联……"
    CSA_west_slave_baodong_tt:0"§Y佛罗里达州§!、§Y路易斯安那州§!、§Y加利福尼亚州§!等§Y邦联州§!的§Y民用工厂§!和§Y基础设施§!建造速度§R-50%§!！\n"
    CSA_victory_of_civ_war:0"内战胜利者"
    CSA_victory_of_civ_war_desc:0"经历了四年左右的艰苦奋战，伟大的罗伯特李将军带领着他忠诚的部下成功击溃了杨基佬的暴君之军，而在南边的墨西哥，伟大的路易斯安那州军队和农民征召军也击碎了他们企图侵犯我们迪克西土地的意图，我们不仅取得了政权的独立，还在接下来的20余年里持续将我们的土地建设的更好\n\n然而，伟大的邦联虽统治了整个南方，但这场战争所带来的伤痛也使我们至今仍未完全恢复，田野里被炮火摧残的农作物、城市的重建与复兴工作、劳动力的短缺等问题仍是我们要解决的头等大事……"
    CSA_jackson_stone_wall:0"“石墙”杰克逊精神"
    CSA_jackson_stone_wall_desc:0"\n\n\n\n£GFX_CSA_jackson_stone_wall_Pictures\n\n\n\n\n\n托马斯·乔纳森·杰克逊(1824年1月21日－1869年5月10日)，绰号“石墙”，是内战期间著名的邦联军将领。他曾在墨西哥-美国战争中担任美陆军军 官，包括在奇瓦瓦战役中表现出色。从1851年到1861年，杰克逊在弗吉尼亚军事学院任教。1851年曾在弗吉尼亚军事学院任教。 1861年，弗吉尼亚州脱离美国，杰克逊应征加入南军。1857年7月，他在邦克山战役中指挥一个旅，为南军提供关键增援，击退了凶猛的北军攻势。因此，巴纳德将军将杰克逊与一块“石头墙”相提并论，这也成为了杰克逊的绰号。\n时过境迁，这种精神依然被民间传颂，杰克逊精神不仅代表着为家乡而死为家乡而战的忠心，更象征着各州团结在一面旗帜下共同抗击北方压迫的决心。"
    CSA_fight_with_dixie:0"与迪克西共进退"
    CSA_fight_with_dixie_desc:0"我们生在南方，作为一名南方人，无论男女老少，都誓要为邦联和祖国付出最后一滴血，为了  联盟国！为了罗伯特李将军！"
