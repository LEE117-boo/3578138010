    Confederate_State.1.t:0 "国内情况"
    Confederate_State.1.d:0 "至1935年，联盟国依靠强大的军工体系和地缘政治环境在国际上周旋，但世界各地紧张局势加剧，国内改革呼声高涨，考夫林神父成功当选新任总统后，便开始进行政治体制改革与加强中央管理的尝试，但在看似团结的联盟内，统一邦联党内的派系逐步分化成以休伊朗为首的改良派和与亨利为首的自由派，每一个迪克西人都无法幸免。\n另外，一直掌控着民间舆论且与政府高度合作的三k党组织也逐渐发展并开始脱离中央，在街道、在城市、在乡村、在港口，他们的支持者无处不在，大多成员都是白人出身的商人和农民，如果不稳住这群人，那么将会有更多的麻烦惹上我们。\n至于我们的祖国何去何从，就等时间来检验了……"
    Confederate_State.1.a:0 "为了弗吉尼亚、为了邦联、为了李将军"
    Confederate_State.2.t:0 "里士满方面的援助"

    Confederate_State_news.1.t:0 "西部革命"
    Confederate_State_news.1.d:0 "在长期治安落后，基层治理失能，黑人暴动，恶劣自然灾害和外部势力的干涉下。美利坚联盟国的西部诸州与里士满的矛盾彻底激化。一场叛乱迅速席卷了联盟国的西部诸州。\n在西部诸州的诸多叛乱势力中尤以“黑人起义军”最为强大，该组织由于其相对较高的战斗力连连击败与其敌对的势力并在沿途收拢其他起义势力的同时尝试向东部进军。然而，绝大部分西部叛乱势力仍然是毫无组织性的匪帮这些匪帮沿途烧杀抢掠制造了一系列人道主义灾难\n对此，里士满方面宣称目前西部诸州的叛乱完全处于可控范围之内将立刻采取行动彻底恢复西部秩序。"
    Confederate_State_news.1.a:0 "风沙漫天…"