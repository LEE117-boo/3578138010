    #国策本地化
    CSA_20th_Century_Alliance: "二十世纪联盟国"
    CSA_20th_Century_Alliance_desc:0 "回首之前的时光，当年的劳动人民迈出了决定性的一步，毅然决然的选择了能带领整个邦联走入复兴的神父，无论是在战争中抛头颅洒热血的罗伯特李的将士，还是在战后重建中的迪克西人民，都为这个崭新的国际政权注入了一针强心剂，而步入1935年，美利坚联盟国这个新兴的政权已然在“庆祝迪克西70周年国庆”的欢呼中开始了他的新的征程。\n新年的第一天，里士满街头的早晨熙熙攘攘，无论是城市的喧嚣还是农村的忙碌，人们来来往往，一切都是那么的熟悉……"
    CSA_The_status_quo_atcc: "邦联大会的现状"
    CSA_The_status_quo_atcc_desc:0 "这个成立于1865年，源于南方国会的一个政治机关在伦敦经济危机爆发后陷入了短暂的运转停滞，但在考夫林神父掌权后，当年大会便重新掌握了东部绝大多数州的信任和支持，在德克萨斯和佛罗里达州建立了监督委员会。\n在今天，查尔斯·考夫林在本周日宣布参加总选举，而邦联党改良派的代表人物——休伊郎，这是他执政一年以来第一次遇见的强劲的政敌；在这两大派系的背后，旧辉格党（新南方民主党）也重组了党内官员，并随时准备向统一邦联党发起冲击；而在民间，三k党为首的激进阵线运动集会在各大州之间也活动频繁，甚至已经采取了一部分暴力行为……"
    CSA_Support_Texas: "支援德克萨斯"
    CSA_The_Star_and_Cfat: "星十字旗屹立不倒"
    CSA_western_affairs: "西部事宜"
    CSA_western_affairs_desc:0 "自联盟国独立以后，西部便成为了三不管地带，是许多走私犯、黑奴、地下反政府分子、叛军、匪徒和游荡者的活动区域，当地政府无力管辖，警察和巡逻队死伤惨重，尤其是南加州邦联政权最为严重，这件事很快被里士满方面高度重视，要不惜一切代价搞定西部事宜。"
    CSA_Gathering_loyal_cowboys: "集结忠诚的牛仔们"
    CSA_Gathering_loyal_cowboys_desc:0 "加州政府与北方政权交接地带中，当地流浪的牛仔成为占据了民间武装80%的组织，牛仔起初是18至19世纪美国西部开发中形成的牧牛从业者群体，之后因西部局势混乱导致大批难民流离加州，现如今的牛仔们大多由叛军、偷渡者和赏金猎人组成，有些人只求生存，而有些是为了满足自己内心的杀戮欲望，我们则可以通过基层政策宣传和收买来团结可以一切团结的力量。"
    CSA_Negotiations_WbfitW: "与西部破产农民交涉"
    CSA_Negotiations_WbfitW_desc:0 "在俄勒冈海岸上登陆的亚洲农夫移民和墨西哥人在第一次南北战争前就已经踏上了这片土地，他们在这里播种粮食养家糊口，而合众国政府那群高高在上的利益集团则无情的打压他们。战后他们的命运更加悲惨，因为历史遗留问题，现在的西部已然成为了犯罪者的天堂，民不聊生，而我们可以团结他们，增加我们在西部的话语权。"
    CSA_Assemble_the_patrol_team: "集结巡逻队"
    CSA_Assemble_the_patrol_team_desc:0 "我们将在各州发布邦联公文，赏金猎人、当地治安部门、志愿公民和专业的猎户将会组成一支支州级巡逻队，邦联政府会把他们武装起来以对抗西部的黑奴叛军和流浪者队伍。"
    CSA_Official_document_iiR: "在里士满发布公文"
    CSA_Official_document_iiR_desc:0 "一纸来自中央的公告彻底打破了凌晨里士满的寂静，关于镇压黑人奴隶和有色人种的民族隔离政策被考夫林神父亲自签署，并通过国家广播传递到了各州，许多武装巡逻队和民兵部队在各大城市和乡村展开大规模搜捕活动，南加州共和国政府宣布进入紧急状态…"
    CSA_Signing_of_the_LEA: "签署《扩地法》"
    CSA_Signing_of_the_LEA_desc:0 "在工业化的今天，效率低下且难以管理的黑奴已然成为了过去式，我们需要一种更加有效率的方法来应对。之前我们在与德国盟友交涉中获得了来自欧洲的先进种植机械，我们将在德克萨斯和东部的种植园率先进行大规模部署；另外我们还需要通过州政府福利政策来引导土地向大农场集中，集中化大农场更有能力投资于机械化设备，进一步提高生产效率"
    CSA_Arrest_of_Black_radicals: "逮捕黑人激进分子"
    CSA_continental_system_defense: "大陆体系防御"
    CSA_continental_system_defense_desc:0 "为了能守护我们的家园，以及把我们的美国统一大业继续进行下去，一个包括灵活防御、后勤补给、攻防兼备的完整的防御体系是必不可少的。"
    CSA_Reorganize_the_Confederate_Army: "改组邦联军"
    CSA_Reorganize_the_Confederate_Army_desc:0 "自1865年后，罗伯特李将军便亲自签署命令，将每个州的兵团投票后自愿解散，而在之后的伦敦大飞机中，无数的军人下岗和军费开支削减导致的社会福利制度下降，引发了种种社会矛盾，甚至让其变成了外国人口中的“美洲病夫”。\n“真理在大炮的射程范围之内”，这句话出自普鲁士盟友前宰相俾斯麦，同时也适用于我们，我们需要重新把军队组织起来，重新建立起统一的指挥体系，伟大的南方军队将重拾理想与罗伯特李之魂，让迪克西利剑重新出鞘。"
