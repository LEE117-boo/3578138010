    USA_The_aftermath_of_the_ec:0 "经济危机的余波"
    USA_The_aftermath_of_the_ec_desc:0 "在长达5年的经济危机中，我们的失业率曾达到恐怖的38%，数万银行倒闭，企业破产，给我们的社会造成了巨大的创伤。\n虽然我们采取了一系列的补救政策，伦敦方面也及时止住了股票的下跌，通货膨胀有所好转，但也带来了许多社会方面的影响，而在这个节骨眼上，柯立芝总统的新任期能否带领我们从余波中走出来，让合众国再一次伟大……"
    USA_Ford_giant:0 "福特公司巨头"
    USA_Ford_giant_desc:0 "福特汽车公司是全球最大的汽车企业之一，1903年由亨利∙福特在美国密歇根州的迪尔伯恩市创立，总部也设立于此。\n经济大危机中，福特与政府高度绑定，并通过远销往至欧洲和亚洲的订单成功度过了这段无比艰难的时光，而现在福特公司继续履行了他的承诺不仅在民用市场方面遥遥领先，而且在政府的鼓励下也逐步冲击军用市场，福特公司的商业帝国正日益扩大。"
    USA_Ford_giant_tt:0 "每月寡头影响力: §Y+0.1§!"
    USA_Southern_Enemy:0 "南方宿敌"
    USA_Southern_Enemy_desc:0 "自1865年那份屈辱的条约签下后，可恶的分裂主义者叛徒们变肆意妄为地在我们的土地上胡作非为，他们违背了华盛顿总统的初衷，他们企图把美国变成一个民族主义和军国主义的新帝国，他们在把民主扼杀在这个新时代，而这是我们绝不能看到的。\n我们忍辱负重近百年，在第一次世界大战后，我们亲眼看见了欧洲战场的惨烈，也学到了很多新东西，相信总有一天我们会再次团结在星条旗之下，让民主的光辉照耀在美利坚的每一个角落！"
    USA_political_openness:0 "开放的社会风气"
    USA_political_openness_desc:0 "经济危机后，自由主义与新文化思潮如潮水般风靡了整个社会，失业浪潮，工作福利下降等历史因素，导致年轻人不得不寻找新的方式逃避现实。我们不否认这种思潮对美利坚的进步性，但如果放任这种思想无限扩张，来自南部的威胁将一步一步将我们吞噬，我们祖国统一的大任要掌握在正确的下一代手中"
    USA_divided_house:0 "分裂之家"
    USA_divided_house_desc:0 "第一次南北战争后，那些条约将原本属于我们的工厂大规模的进行没收与充公，里士满方面因此赚的盆满钵满，因东南部港口及平原的丢失，我们的工业产出相较于前大幅度下降，虽然近几年我们依靠着欧洲盟友的支持稳定的推进现代化建设，但南部的威胁始终是我们不可避免的一个严肃话题，我们必须掌握主动性，才能使我们的祖国再次统一"
    USA_divided_house_tt:0 "§R无法解除对南方联盟的禁运§!"