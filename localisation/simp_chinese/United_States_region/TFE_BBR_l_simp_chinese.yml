   BBR_Bayard_Rustin:0 "贝亚德·鲁斯汀"
   BBR_Bayard_Rustin_desc:0 "贝亚德.鲁斯汀于1912年出生于宾夕法尼亚西切斯特。在他的童年里，是他那贵格会祖父母常伴他身旁并在他幼小的心中深深打下了和平主义和种族平等思想的烙印。\n鲁斯汀曾就读于威尔伯福斯大学和切尼州立师范学校两所传统黑人院校。后来鲁斯汀受到社会主义思潮的影响并加入共产党，此后他便一直关注和推动南方的黑人解放运动，在经历了多年运营后，对南方奴隶主们的清算之日终于来到而鲁斯汀将亲自领导这场席卷南方的革命。\n“真正的平等，不是只让一部分人自由，而是让每一个被边缘化的人都站在阳光下”。"
   BBR_Unorganized_leadership:0 "无组织的领导层"
   BBR_Unorganized_leadership_desc:0 "我们的革命取得了初步成功，这是值得庆祝的，同志们，但我们现在必须面临一个问题，我们的军官缺乏指挥经验，我们的士兵缺乏作战经验，同时还有粮草不足等问题。"
   BRB_revolutionary_enthusiasm_1:0 "革命热情"
   BRB_revolutionary_enthusiasm_2:0 "革命热情"
   BBR_Confederate_siege:0 "邦联的围剿"
   BBR_peoples_war:0 "人民战争"
   BBR_Riots_broke_out:0 "暴乱四起"
   BBR_Land_reform_weapons:0 "土改武器"
   BBR_Red_Army:0 "红军"
   BBR_for_ideal:0 "为了理想"
   BRB_Deep_guerrilla_tactics:0 "纵深游击战术"

   BBR_for_our_freedom:0 "为了我们的自由"
   BBR_for_our_freedom_desc:0 "我们的祖先在南方受尽压迫，而现在我们一无所有，这片土地埋藏了太多眼泪与委屈，每一寸耕地都在哭诉着我们的不甘与愤怒，我们曾经卑微的向他们乞讨请求他们的怜悯，而这没唤起白人一分一毫的尊重……\n我们的祖先在南方受尽压迫，而现在我们一无所有，这片土地埋藏了太多眼泪与委屈，每一寸耕地都在哭诉着我们的不甘与愤怒，我们曾经卑微的向他们乞讨请求他们的怜悯，而这没唤起白人一分一毫的尊重……"
   BBR_The_flame_of_rwnbe:0 "抵抗之火绝不熄灭"
   BBR_The_flame_of_rwnbe_desc:0 "我们开始了我们自己的征途，但这条路始终不会顺利，里士满奴隶主阶级与反动的资本主义者对我们展开了围剿。但我们不会就此妥协，我们将会在河岸边、在乡村中、在城市里与敌人作战。\n既然我们没有先进的武器，我们就以血养战、以弹换命，我们将展开神圣的游击战争。\n没有枪，没有炮，那我们就让敌人给我们造！"
   BBR_Prepare_revolutionary_supplies:0 "筹备革命物资"
   BBR_Unite_the_left_wr:0 "团结左翼革命者"
   BBR_Unite_the_left_wr_desc:0 "正如贝鲁汀同志所说，革命可不能带着白手套进行，白人反动统治阶级和奴隶主们团结起来了，在如此局势下，我们的革命不能单独进行……\n来自华盛顿民间的同志们和墨西哥将会帮助我们，根据民间调查显示，很多的新一代白人学者对几十年来的奴隶主义有了不满情绪，我们可以尝试去指引他们。"
   BBR_new_red_army:0 "新红军"
   BBR_new_red_army_desc:0 "我们虽奉行着无领袖抵抗原则，但这一机制也带来了许多弊端，例如没有统一的指挥层，面对单个方面的围剿时不能做到统一的指挥调度。这导致我们的同志们损失惨重。所以我们需要建立一个完整的指挥体系和中央指挥部，协同调度我们的革命行动，使我们的革命变得有序而有力，而贝鲁汀同志是红军指挥部最高司令的最佳人选，我们将会在他的带领下破除那些压迫在我们身上的枷锁，让我们重获自由"
   BBR_Dawn_of_the_Black:0 "属于黑人的黎明"
   BBR_Dawn_of_the_Black_desc:0 "“这就是命运”，这句话在贝鲁汀同志的一生中响了不知有几万次，邻居，家人，朋友和工友都曾这样说过。当他在上大学的时候便在路边看过许多黑人同学被白人欺负凌辱，这也让他在心中埋下了一枚反抗不公的种子，当他在与朋友聊天时说要缔造一个平等的社会时，许多人都在嘲笑他和他的理想，甚至把他的理想判定为不可管教之事……\n而现在我们已经夺取了生产资料，我们要证明我们的目标绝不是空穴来风，我们的理想绝不是所谓的叛乱，而是伟大的革命！"
   BBR_Down_with_the_stou:0 "打倒压迫我们的枷锁"

   BBR_Black_Lenin:0 "黑人列宁"

