CSA_Hueylon_Doctrine_desc:0 "以“人人皆国王”为口号，强调代表底层白人工农来对抗大企业寡头和黑人；以指令经济和反法西斯思想在全国范围内建立高度集权的“朗机器”，控制州议会、法院、媒体和公务员系统，打压政局内的反对派，并把国家军队作为使用私人武装来维持秩序‌。在种族问题上持保留态度，主张建立种族隔离区和自治区来缓解社会矛盾，同时利用国家机器随时随地对可能到来的革命进行镇压和平叛。"
