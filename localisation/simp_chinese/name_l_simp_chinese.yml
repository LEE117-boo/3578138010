CSA_Confederate_desc: "\n\n\n\n£GFX_CSA_Confederate_Pictures\n\n\n\n\n\n§R邦联国体制§!是一种以民粹主义和宗教元素构成的独特的地缘政治体制，这种思想源于在美利坚联盟国取得第一次美国内战的胜利后，由一群来自佐治亚州、南加利福尼亚州、弗罗里达州、南卡罗来纳州和北卡罗来纳州的老奴隶主和年轻的白人至上主义者提出，并且在1907年在第十三届邦联大会上被新3k党成员多次提名，§R邦联国体制§!在名义上认可私有财产不可侵犯，但同时强调了白人种族要优于黑人种族的原则与立场，在考夫林时代又加入了法西斯主义与天主教元素，使其看起来变得更加庄重和秩序化。" 
