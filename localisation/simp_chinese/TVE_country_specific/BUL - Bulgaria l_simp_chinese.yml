 BUL_communism_bandit: "赤匪肆虐"
 BUL_communism_bandit_desc: "§Y事态发展的后果，对我来说已很清楚：有朝一日，不是对九月事件耿耿于怀的莫斯科，就是死难者的追随者，抑或是国外势力，会把我送到天国。-鲍里斯三世§!\n\n赤匪，赤匪，还是赤匪！整个保加利亚的农村几乎是赤匪的天下，自从他们抛弃了城市道路和农民联盟一起在乡村合作，他们的影响力便与日俱增。他们在基层反对我们的政策，导致我们的税收无法收上，兵力无法得到供给。如果不彻底解决这个问题，那么国家的改革将不会有效的实施。"
 BUL_Military_Development_1: "军队建设状况:糟糕透顶"
 BUL_Military_Development_1_desc: "保加利亚目前的军队可谓烂中自有烂中手：军队腐败，训练松驰，军备废弃——昔日“巴尔干普鲁士”的称呼完全与现在的军队不相配。我们的军队迫切需要改革，负责难以保卫我们的国家和所需实施的战略任务。"
 BUL_Economic_development_1: "经济建设状况:财政危机"
 BUL_Economic_development_1_desc: "自伦敦大股灾和一战以来，保加利亚的经济从来没有好过。乡村中地主占有保加利亚大部分的土地，而城市中有大部分是贵族的产业。因此，中小企业难以得到发展，外资难以进入市场，保加利亚因此被称为赤字王国，人民将对生活的不满转移到对政党的不服从。我们迫切需要进行一场改革来解决危机状况，否则革命之火将会燃尽国家。"
 BUL_Tsar_Conspiracy: "沙皇的阴谋"
 BUL_Tsar_Conspiracy_desc: "鲍里斯三世自从宝剑行动之后就对我们表示无条件支持服从，但这完全不符合他的政治立场。而且近期种种迹象表明，他已经构建了相当庞大的政治反对同盟。哪怕我们没有证据，也应该对其有足够高的警惕意识，以防他对我们发起政治阴谋。"
 BUL_Ironfisted_rule: "铁腕统治"
 BUL_Ironfisted_rule_desc: "自环节派夺取政权以来，国家便确立了军队-政府的管理模式，任何反对国家的行为都遭到了严厉打击。同时，任何对国家利益不义的行为都会遭到打击，这种模式在一定程度上保证改革的稳定性和政府的效率，但却忽略了大部分人的声音。如果通过一定改革使其变为更加高效的工具，也许会擦出另一种不一样的火花。"
 BUL_Treaty_of_Sofia: "《索菲亚条约》"
 BUL_Treaty_of_Sofia_desc: "《索菲亚条约》对于保加利亚进行了严格的军备限制和赔款要求，这导致我们虽然在西色雷斯也有着名义上的主权，但是其实际管辖权仍然大部分归于希腊，这使我们的国家更类似于统而不治的存在。这也为我们国内的民族主义提出了一个向外发泄的借口，我们必须寻求一定的方法废除或修订这个条约，否则将会对国内的改革造成很大的恶性影响。"
 BUL_Treaty_of_Sofia_tt: "§R不得训练，编制军队，师数量限制在15个以内§!"
 BUL_Doubleedged_sword: "马其顿的双刃剑"
 BUL_Doubleedged_sword_desc: "马其顿，一个覆盖在大保加利亚的重要地区。在一战中，我们在当地培养了我们自己的亲和势力——IMRO，但这也为我们埋下了机遇和患难。如果我们强大起来，他可以作为我们在马其顿的代言人，以实现我们大保加利亚的方案。但是如果我们弱小，这将会成为外国侵略我们亦或是打压我们的的借口。我们对于马其顿的态度该如何调整已经变得越来越迫在眉睫。"