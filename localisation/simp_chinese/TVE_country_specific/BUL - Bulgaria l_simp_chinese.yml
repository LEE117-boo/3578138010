 BUL_boris_iii: "鲍里斯三世"
 BUL_boris_iii_desc: "§Y出生日期:1894年1月30日§!\n鲍里斯三世，自幼便生活在充满意志与风俗习惯的家族之中。年幼的他，跟随父亲斐迪南一世，认识到了大量西方先进的技术及文化。他最喜欢的爱好，便是研究火车。生活是那样悠闲而美好。\n然而，天有不测风云。一战爆发了，成编制的保加利亚军人一队队送上战场，又一队队抬下。而父亲所奉行的独夫与独走政策，对保加利亚经济百害而无一利。于是，可以预见地，保加利亚顺理成章大败而归。而父亲似乎也继承了德意志的“优良传统”——居然不堪重负，退位跑去了德国！\n而这也是沙皇鲍里斯三世登基的开端……\n父亲所留下的烂摊子，各方利益盘根错节。以农民联盟为首的势力牵下了所谓的战败条约，却引火烧身，触动了保守派的利益，被环节派所政变。而这让鲍里斯几乎丧失了所有权力，甚至遭到环节派的胁迫，以至于差点被废黜。\n然而，在皇宫中高坐的鲍里斯，利用环节派内部保皇派与原有势力的冲突，成功夺回了属于自己的权力。\n今天，鲍里斯三世站在阳台上。夺回权力的他，心中却五味杂陈。但有一个永恒的主题——为了保加利亚及人民，如果可以，他愿拼尽全力，维持好各方利益；他愿毫不犹豫献出自己的灵魂，将保加利亚领上一条繁荣富强的道路。"
