l_simp_chinese:
 CHI_Aftermath_of_the_stock_market_crash_1: "伦敦股殇余瘟"
 CHI_Aftermath_of_the_stock_market_crash_1_desc: "于民国十八年遥远欧陆英帝国首都伦敦爆发那场恍若古传说中席卷世界之海啸般之金融危机将全球经济拉入深渊，我国亦未曾幸免\n\n尽管后续我政府采取多项措施以扼西大陆波及而来之霍乱，如此浩劫与毫无征兆却使我国恢复进展缓慢，以至于时隔五年，社会上下仍呈现幅萧条与凋敝之画卷。"
 CHI_Difficult_Industrialization_1: "工业化堪为艰"
 CHI_Difficult_Industrialization_1_desc: "北洋廿四载，实业之途颇类老牛破车。袁公当国之初，修宪改制，设局劝工，然新政多承前清积弊，譬如旧屋糊新纸，梁柱已蠹。各局总办坐领乾薪，机器进口竟有以朽木充箱底之奇闻。赤方之地，除金陵，广州，长沙等城郭，皆荒蛮无度，瘴气丛生，似刀耕火种之时节。"
 CHI_Year_of_Career_Success: "正值事业之年"
 CHI_Year_of_Career_Success_desc: "袁世凯先生励精图治，舞精诚团结，抵外侮于国门，贡殷为国，现时已三十多余年，今正值暮年有智，矢勤矢勇，中华之光景将续继由袁先生统领！"
 CHI_super_president: "超级大总统制"
 CHI_super_president_desc: "自新约法颁颂伊始，大总统总揽治权，权利所达之巅可与秦皇汉武相匹。数年来，外媒舆论尝言：“项城手定宪章，虽无帝王之名，然教令所出实逾九鼎。”金陵之疏影早便撕扯凋零，燕京阙里之槐荫却已遮蔽云霄。\n\n时人夜过新华门，但见双铁狮仍似辛亥年间威武雄壮，然“共和”二字墨迹，已于无人留意之角落，褪色干涸……"
 CHI_Rise_of_nationalism: "民族主义崛起"
 CHI_Rise_of_nationalism_desc: "瞰我东亚之时局，西至迪化，东抵奉天，皆属五色旗飘扬乘风之地，皆为“中华国货”遍及之处。各校学人高举“五族共和”之大旗，开设讲堂作证“中华民族”论调。\n\n观黄浦江畔杂店国货陈列，顾维吾尔之商铺国文牌匾，“华夏共荣”之意便于此具现。"
 CHI_slow_school: "府学啄玉徐缓"
 CHI_slow_school_desc: "前清光绪三十一年，距清帝退位仅余七年久时，朝廷终悔若不大刀阔斧改革帝国将倾灭之理，遂于此年正式废除科举制.然为时已晚，清国从上至下均已似冢中枯骨再无力回天。\n\n大统领以新政总设计师自居，自莫步前清固步自封之后尘，于上任以来便就教育领域行改革之事，破旧害修新宪，广设西洋学堂.然二十余年已过，此番改革成效却未如预期般使科教领域焕然一新，相反，改革过程中充斥着腐败与迟缓，现如今已成尾大不掉之势，连年赤字也使统领愈发对此失望.倘若无及时再立新法，可遇见之未来，我大中华恐会流露“往来皆白丁”之盛况。"
 CHI_Yuan_pride: "袁帅武威扬望"
 CHI_Yuan_pride_desc: "镇压叛乱，卫戍边疆，改善民生-----此等功绩若置于任一国人履历当中，史书必会为其留足浓墨重彩之一笔.伟大统领袁项城亦入其列.\n\n自宣读就职大总统以来，项城便为民国无可争议之统领，然南方诸匪并未如此思忖，妄糟践我统领治国宏图，多次于明暗挑拨事端-----直至第二次粤桂战争.\n\n龙许剿灭联军桂寇谭浩明后，南北正式统臣于统领一人之下，再无割据之局，也使我统领声威权望达至顶峰-----理应如此.\n\n可五洲四海之袁帅画像不过图于表象，若有朝一日此孱弱平衡均消失，届时，神州大地亦将沦为人间炼狱……"
 CHI_Beiyang_army: "刀枪鸣北洋军"
 CHI_Beiyang_army_desc: "新式陆军可谓我政府改革之模范与楷模领域；鸦片战争后，即使清政府行多次变革之举，然仍未达现代化之效，更于日清战争中一表纸老虎本色.\n\n书页翻至民国五年，统领沿清末新政，就我军外强中干之弊病此事大加整顿.时至今日，我军已于军械装备层面整肃完毕，虽军中屡报纪律问题，但就整体情况而言，北洋军以进步颇多，且仍以此速络续发展。"
 CHI_farmer_eco: "佃农家经济依"
 CHI_farmer_eco_desc: "在施行多方面多种措施政策推行工业化，一支不争之事实依旧一直于诅咒般将我国牢牢困于其中，此便为根深蒂固之佃农经济。\n\n该经济模式已扎根于九州千年久，不仅局限经济——社会，思想乃至文化均受其制约，如此盘根错节绝非一朝一夕可牵动矣，好似紧箍咒般，任凭如何挣扎，终只以回溯原点为结语。\n\n而今，此等诅咒已愈发明显，伦敦股殇又猛添干柴，外界纷纷扬言：“中国经济，现进入垃圾时间”……\n\n制度变革刻不容缓，四万万人民翘首以盼等待着明日天安门之动向，然，此等耐心已接近尾声，体制内有序改革若令人民知晓无法兑现，“革命”，亦将成为第二选项。"
