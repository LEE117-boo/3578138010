l_simp_chinese:
 CHI_Aftermath_of_the_stock_market_crash_1: "伦敦股殇余瘟"
 CHI_Aftermath_of_the_stock_market_crash_1_desc: "于民国十八年遥远欧陆英帝国首都伦敦爆发那场恍若古传说中席卷世界之海啸般之金融危机将全球经济拉入深渊，我国亦未曾幸免\n\n尽管后续我政府采取多项措施以扼西大陆波及而来之霍乱，如此浩劫与毫无征兆却使我国恢复进展缓慢，以至于时隔五年，社会上下仍呈现幅萧条与凋敝之画卷。"
 CHI_Difficult_Industrialization_1: "工业化堪为艰"
 CHI_Difficult_Industrialization_1_desc: "北洋廿四载，实业之途颇类老牛破车。袁公当国之初，修宪改制，设局劝工，然新政多承前清积弊，譬如旧屋糊新纸，梁柱已蠹。各局总办坐领乾薪，机器进口竟有以朽木充箱底之奇闻。赤方之地，除金陵，广州，长沙等城郭，皆荒蛮无度，瘴气丛生，似刀耕火种之时节。"
 CHI_Year_of_Career_Success: "正值事业之年"
 CHI_Year_of_Career_Success_desc: "袁世凯先生励精图治，舞精诚团结，抵外侮于国门，贡殷为国，现时已三十多余年，今正值暮年有智，矢勤矢勇，中华之光景将续继由袁先生统领！"
 CHI_super_president: "超级大总统制"
 CHI_super_president_desc: "自新约法颁颂伊始，大总统总揽治权，权利所达之巅可与秦皇汉武相匹。数年来，外媒舆论尝言：“项城手定宪章，虽无帝王之名，然教令所出实逾九鼎。”金陵之疏影早便撕扯凋零，燕京阙里之槐荫却已遮蔽云霄。\n\n时人夜过新华门，但见双铁狮仍似辛亥年间威武雄壮，然“共和”二字墨迹，已于无人留意之角落，褪色干涸……"