 IRQ_start_national_country: "堪堪起步的民族国家"
 IRQ_start_national_country_desc: "自巴格达大起义（瓦斯巴）以来，共和国一直在推进现代民族主义的理念，以期能够取代长期以来主导伊拉克社会的部族主义与封建神学概念，推动国家的复兴，可直到目前为止，我们收效甚微。\n\n反对民族主义的主要力量来自于社会各个层面：在偏远的地区，许多部落酋长仍反对整体化的伊拉克，希望借此维持自己在当地的反动权威；库尔德人、犹太人害怕遭到阿拉伯人的迫害，怀念其在殖民统治时期取得的不合理的过高地位；另一方面，一些落后教义的信奉者，乃至于民族主义主要来源的泛阿拉伯主义者中，也有一部分认为伊拉克民族主义对伊斯兰世界或阿拉伯的统一弊大于利。"
 IRQ_start_national_country_tt: "§R想要团结起一团散沙的伊拉克，任重而道远§!"
 IRQ_Preliminary_nation_industry: "国有化斗争-初步胜利"
 IRQ_Preliminary_nation_industry_desc: "在伊拉克人民与英国民政专员的英勇斗争中，共和国已基本完成了对旧帝国主义殖民势力的清算。税务、财政、卫生、公共工程和司法秘书处的英国专员均已被驱逐境外，武装起义击退了英军，伊拉克成立了独立的行政机构，政治上的国有化斗争已经完成。\n\n但是，石油、铁路等重要国民经济支柱产业仍有不少由英国控股。\n\n我们尝试了诉诸法律，但旧秩序的国际法没有为我们带来公平正义。殖民地的独立只能自己争取，大瓦斯巴教会了我们这一点。\n\n或许，是时候该考虑如何夺回我们自己的财富，砸碎帝国主义强加的锁链了。"
 IRQ_gun_fight_pen: "枪杆子与笔杆子的斗争"
 IRQ_gun_fight_pen_desc: "1930年，伊拉克左派元老提曼组建的工匠协会已发动广大工人通过总罢工参与了伊拉克独立的进程，但手工业者、无产阶级中革命的另一派——拉希德·阿里·盖拉尼所创建的民族派的影响同样不容小觑。\n\n自1930年的革命合作以来，工匠协会早已转变为了如今的伊拉克民众党，依托左翼教师、学生、《国民报》派与工会等组织发挥着强大的组织力与领导力，在军队中也有复兴党的支持者们坚定不移地支持左翼革命路线。近年来，随着《国民报》派主导的政府推进的经济改革愈发深入，伊拉克的复兴愈发加快，左派获得了在民众之间广泛的声望。\n\n可民族派的影响力在手工业者、商人、青年、工农中也正在日益崛起，新伊拉克的军队中绝大多数由民族派的激进军官“金方阵”所控制，贝克尔·西德基元帅更是坚定不移地支持着民族派。近年来，民族派的早期组织同胞党改组为革命同胞会，其叙事正向越来越接近底层利益的革命方向激进化，相应地，对于尚且未能接受红色思想的底层人民而言，民族派正成为一个具有更强吸引力的革命选项……\n\n目前，两大元老仍然能维持伊拉克的团结，§R希望一切不会出问题§!。"
 IRQ_fall_land_rev: "一轮土地改革-完全失败"
 IRQ_fall_land_rev_desc: "英国统治时期，酋长被赋予了大量权力，包括兼并土地、独立行政、阻止农民外流等等。1930年英国傀儡王室出台的《伊拉克区域自治法》更是合法化了农民对酋长的人身依附，使事实意义上成为农奴的自由小农与佃农成指数级增加。部落变成了独立王国，大地主愈来愈富，他们大发投机财、国难财，其中大酋长哈迪·贾拉比甚至凭借粮食投机买卖成为了中东首富之一。\n\n共和革命以来，我们多次试图通过温和的土地革命改变农村的现状，但我们失败了。\n\n官员被恐吓、暗杀，农会被解散，胆敢反抗的农民被绞死示众……\n\n或许，必须忍受一次巨大的社会动荡，使用更加§R激进§!的手段，我们才能铲除这颗针插不进水泼不进的毒瘤。"
 IRQ_discussion_of_massacre: "亚述屠杀案争议"
 IRQ_discussion_of_massacre_desc: "巴格达大起义时期，响应革命号召的一支革命派部队曾经在伊拉克北部屠杀了约300名亚述人。这些人试图逃离革命者的控制区域，进入叙利亚避难。\n\n当时，8月11日，在当地发生动乱后，伊拉克军一个机枪连开进摩苏尔西北方一座名叫西梅尔的亚述基督教村庄，有条不紊地射杀了每一个男人。被害者数量为315人，其中包括4名女性和6名儿童。“在这几天中，60多座村庄里总共有3000人遇害，其中大多数是在手无寸铁的情况下被屠杀的。\n\n然而，但千万不要以为他们只是一些无辜的平民，其中固然有被牵连的村民，但绝大多数亚述人都曾作为少数民族的代表参与了英国殖民者对伊拉克惨无人道的殖民统治与镇压，这300人中几乎所有超过13岁的男性都参与过殖民者的军队，并且事实上对伊拉克人民、尤其是阿拉伯民族的妇女儿童犯下过血的罪行，手上沾染着无数人命。\n\n事实上，当时的革命政府将其宣传为一个杂糅着亚述人叛乱、英国人削弱控制国家的阴谋和伊拉克军队爱国功绩的故事。伊军士兵受到表彰，在摩苏尔和巴格达举行了胜利阅兵，在这两座城市，人们用甜瓜堆成胜利拱门，这些甜瓜被匕首刺穿，以象征亚述人的首级。据伊拉克作家卡南·马齐亚所言，西梅尔大屠杀是“这个奥斯曼帝国前阿拉伯行省的首次民族独立表现”。\n\n随着时间的流逝，对于亚述大屠杀案的争议也逐渐被人们关注，有人视此事虽然有些许错误、但应当作为伊拉克民族革命令人骄傲的胜利被铭记，但也有人认为未经审判的屠杀以及对家属孩童的牵连毕竟是不人道的。\n\n是嫉恶如仇、血债血偿？还是放下仇恨、共同建设？\n\n§R对争议的不同处理可能将这场革命带上不同的道路§!"
 IRQ_rev_new_city: "“革命新城”建设热潮"
 IRQ_rev_new_city_desc: "革命解放了无产阶级，房租被下调，食品供应稳定了，8小时工作制与加班费得到保障，专属于穷人的干净、廉价的砖房拔地而起，全国各地的城市化进入了建设高潮。随着教育和卫生拨款的上升，夜校、医学院、公立医院、卫生所、工学院等公共工程建设也不断扩张，来自欧洲与亚洲的教师源源不断地涌入，不断扩张的城区被人民亲切地称为“革命新城”。虽然这一切都依靠政府财政支持，但是我们的确依靠建造业和经济上的计划性在这个动荡的岁月为伊拉克带来了一篇和平与希望的灿烂诗篇。"
 IRQ_wavering_Shia: "摇摆不定的什叶派"
 IRQ_wavering_Shia_desc: "什叶派是伊拉克除逊尼派阿拉伯人之外最大的少数团体，他们的意见至关重要。目前，什叶派同时作为受压迫和歧视的少数团体和虔诚的穆斯林存在。身为前者时，他们支持《国民报》派代表的平等与包容，身为后者时，他们又发现摒弃了教派歧视的民族派所提倡的文化复兴更具有吸引力——虽然后者的主体是逊尼派信徒。\n\n如何争取什叶派的信任，很大程度上将决定共和国未来的方向。"
 IRQ_support_ym_rev: "支援也门革命"
 IRQ_support_ym_rev_desc: "巴格达古诗云：\n“踏着长夜的足迹，追往事，情难依旧，\n晚风轻拂，暗香盈袖；\n皓月如昼，疏星倒悬，游子悠悠。\n‘别了，你依依相思的心上人哟！’”\n\n别了，亲爱的祖国、亲爱的恋人、亲爱的家人，今夜我们安眠萨那的星空下！与我们的也门阶级弟兄和民族同胞睡在同一片星光闪烁的夜空下！\n\n也门的革命是阿拉伯民族觉醒和阶级斗争在阿拉伯世界的高潮！我们必须支援我们的也门兄弟，前进吧，勇敢的伊拉克民族，站起来的伊拉克人民！与我们的兄弟手拉起手，我们要赶走殖民者，我们要建设一个崭新的世界！\n\n支援也门革命，是我们不可逃避的义务，也是我们骄傲领受的光荣！"
 IRQ_rise_star_of_2_rivers: "两河流域的赤色灯塔"
 IRQ_rise_star_of_2_rivers_desc: "——“在它牵起你的手，去支持正义的事业，去面对腐败、不公、暴政和傲慢的力量之前，它会从内而外建立你，净化你在智力和灵性上，摆脱所有缺点、腐败、傲慢和傲慢，去除你身上所有偏离和扭曲的特征。你内在有能力爆发，随后你拥有夺取革命的胜利所需的力量。”\n\n两河流域的巴格达，有着骄傲的历史。尼布甲尼撒曾经引领这片土地上战斗的人民驱逐了犹太人，作为阿拉伯民族骄傲的一员，今天，伊拉克人民又在社会主义革命的带领下第一次驱逐了殖民主义势力。\n\n伊拉克是阿拉伯地区第一个完全独立的国家，也是一个红色国家。我们的革命必将为整个阿拉伯地区的左派与民族主义者建立榜样。\n\n我们是骄傲的太阳，我们照耀着阿拉伯的土地，我们指引着通往光明与解放的航路，我们是伟大的，我们是巴比伦，我们是巴格达，我们是一千零一夜中灿烂辉煌的诗篇，我们是……无产阶级的曙光。\n\n受辱者的光芒在手掌中闪耀，举起手来，革命将让我们的光芒汇聚成令敌人目盲的闪光！"

