l_simp_chinese:
 IRQ_Bakr_Sidqi: "贝克尔·西德基"

 

 IRQ_start_national_country: "堪堪起步的民族国家"
 IRQ_start_national_country_desc: "自巴格达大起义（瓦斯巴）以来，共和国一直在推进现代民族主义的理念，以期能够取代长期以来主导伊拉克社会的部族主义与封建神学概念，推动国家的复兴，可直到目前为止，我们收效甚微。\n\n反对民族主义的主要力量来自于社会各个层面：在偏远的地区，许多部落酋长仍反对整体化的伊拉克，希望借此维持自己在当地的反动权威；库尔德人、犹太人害怕遭到阿拉伯人的迫害，怀念其在殖民统治时期取得的不合理的过高地位；另一方面，一些落后教义的信奉者，乃至于民族主义主要来源的泛阿拉伯主义者中，也有一部分认为伊拉克民族主义对伊斯兰世界或阿拉伯的统一弊大于利。"
 IRQ_start_national_country_tt: "§R想要团结起一团散沙的伊拉克，任重而道远§!"