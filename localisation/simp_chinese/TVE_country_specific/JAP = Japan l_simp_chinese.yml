l_simp_chinese:
 JAP_Unbroken_line_through_ages: "万世一系"
 JAP_Unbroken_line_through_ages_desc: "自帝国颁布诏书以来，天皇便是国家的机轴。对外，天皇是日本国家的象征。对内，于普罗百姓而言，天皇是引领者和神明；于政治体系而言，天皇是各方斗争来往的底线与中枢。进入近代以来，日本能以相对稳定的身姿走过数十载而未落得如某些国家般四分五裂的下场，皆仰仗天皇作为植物的根系去粘合日本松散的“土壤”，并支撑起地表上那颗看起来还过得去的“大树”。"
 JAP_Unbroken_line_through_ages_tooltip: "§R可随着时局的变化，这机轴的未来似乎也扑朔迷离？§!"
 JAP_Chaotic_Cabinet: "混乱的内阁"
 JAP_Chaotic_Cabinet_desc: "1892年的内阁制建立之初，便以强力、高效著称。但这一体制随着第一次日俄战争的失败受到了巨大冲击。战争的失利让立宪派上台，其对于阁僚的自由度的改革以及强化议会的职能与议事权限的做法使得该体系变得低效而混乱。虽然此后日本政局和国内外局势早已今非昔比，但这股政治惯性一直延续至今。"
 JAP_Confused_road: "迷茫前路"
 JAP_Confused_road_desc: "1923年的神武之变后的十数年间，日本政治一直由森-桂体制所维系，废止民主化改革、强化传统权力结构等举措暂时让日本平稳地航行于历史长河当中。但随着森恪与桂太郎两位核心人物的死亡，这套体制也濒临瓦解。铃木贞一作为森恪的继承人被推上台前，承担起锚定前路的职责。当然，或许他能力挽狂澜；或许他会迅速黯然下台从而将权柄交给其他人……\n\n但无论是谁在此时承接过这份责任，都必须要为这套体制的延续和担起使命。"
 JAP_Confused_road_tooltip: "§R日本未来将会如何呢？§!"
 JAP_Aftermath_of_Republican_Revolution: "共和革命的余波"
 JAP_Aftermath_of_Republican_Revolution_desc: "“日本民主共和国”的生命虽然只有短暂的77天，但它的余波却漫长而持久。“革命”、“共和”两个词语如同幽灵般飘荡在日本上空。它是一套完全独立于现行所有政治派别外的思潮，冲击着日本上上下下——对于普罗大众而言，他们意识到了自己手中蕴含的力量，当压迫和残暴降临时，他们可以选择另一种方式去向统治阶级表达自己的抗争甚至取而代之。对于高层而言，他们也明白了面对日本的未来，必须要有所作为。因为他们不再是民众们的唯一解，当他们彻底让人民失望之时，后者便会去投靠另一股可以葬送他们的力量。"
 JAP_Aftermath_of_Republican_Revolution_tooltip: "§R共和国政体虽死，但其精神永存§!"
 JAP_winner_of_RussoJapanese_War: "日俄战争的胜利者"
 JAP_winner_of_RussoJapanese_War_desc: "虽然经历过第一次的失败，但在第二次日俄战争中，日本军队发挥出色，一雪前耻，成功将俄国佬赶出了满洲。战争的胜利不仅提振了日本民众的士气，也对军队内部带来了诸多影响。许多表现英勇的士兵和军官得到了嘉奖而提拔；军事理论和军事科学方面也正发生着变化...但这些变化究竟是会进一步锤炼日本军队，还是就此让其变得自大、傲慢和僵化……"

