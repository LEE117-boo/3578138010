l_simp_chinese:
 JAP_Unbroken_line_through_ages: "万世一系"
 JAP_Unbroken_line_through_ages_desc: "自帝国颁布诏书以来，天皇便是国家的机轴。对外，天皇是日本国家的象征。对内，于普罗百姓而言，天皇是引领者和神明；于政治体系而言，天皇是各方斗争来往的底线与中枢。进入近代以来，日本能以相对稳定的身姿走过数十载而未落得如某些国家般四分五裂的下场，皆仰仗天皇作为植物的根系去粘合日本松散的“土壤”，并支撑起地表上那颗看起来还过得去的“大树”。"
 JAP_Unbroken_line_through_ages_tooltip: "§R可随着时局的变化，这机轴的未来似乎也扑朔迷离？§!"
