 germany_news.1.t:0 "布吕宁赢得大选"
 germany_news.1.d:0 "作为天主教中央党的党魁，布吕宁的影响力在德国政坛自然无需多言，再加之传统大党社民党和新兴政党民主党的支持，祖国联盟的胜出也是理所当然。在今日，布吕宁在柏林的中央广场上进行了宪法宣誓，在数以万计的帝国公民前，布吕宁表达了自己对帝国的忠诚和对宪法的拥护，众人合唱《胜利者的桂冠》，场面何其盛大。想必有这样的首相，德意志帝国的复兴或许不远了。"
 germany_news.1.a:0 "新时代，新首相。"
 germany_news.2.t:0 "施莱歇尔赢得选举"
 germany_news.2.d:0 "在胡根贝格的宣传攻势下，团结与行动阵线赢得了大选，作为执政联盟的奠基人，施莱歇尔被推选为了首相。\n多位政界人士表达了对军部影响力扩大的担忧，但也有部分人士向该执政联盟示好，希望能成为“横向阵线”计划中的参与者之一。"
 germany_news.2.a:0 "一个军人的内阁？"
 germany_news.3.t:0 "柏林发生军事政变"
 germany_news.3.d:0 "今日，帝国日报报告了一条痛心疾首的消息，人民敬爱的伟大首相，上帝的虔诚信徒，海因里希·布吕宁死于了无忧宫的交火中，尽管未曾表明卫队与政变部队发生了交火，但仍有人表明听见了开枪声。\n此刻，胡根贝格建立的“帝国紧急状态委员会”接管了布吕宁内阁的所有机关部门，或许在不久，帝国的政治机器便能重新运转。"
 germany_news.3.a:0 "一次政变，一个灾难。"
 germany_news.4.t:0 "凯撒执掌大权"
 germany_news.4.d:0 "在胡根贝格集团的秘密夺权行动被威廉二世粉碎过后，针对军部的大清洗也已经开始，威廉二世开始重新任命多个担任要职的官员返回岗位，并宣称将重新任命首相来稳定帝国局势，尽管如此，凯撒再掌大权的事实也已经摆在了面前。\n德意志的民主改革已经胎死腹中，普式宪政再一次回归了德国的政坛，德意志不知再过多久才能重回1920的自由景象……"
 germany_news.4.a:0 "德国也没变化多少嘛。"