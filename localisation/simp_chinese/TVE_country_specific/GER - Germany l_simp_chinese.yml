 GER_Prussian_military_spirit: "普鲁士军魂"
 GER_Prussian_military_spirit_desc: "军国主义在曾经的一段时间内成为了普鲁士的代言词，但这同样也是组织起整个国家的最好工具，我国的历代君主都率领此军创造了历史上一个又一个的军事奇迹，拥有此军帝国必将战无不胜，只待一个时机，德意志的钢铁将和鲜血一起铸就欧陆的新秩序！一支拥有国家的军队——这就是帝国的答案！"
 GER_Bureaucratic_administrative_system: "臃肿的行政系统"
 GER_Bureaucratic_administrative_system_desc: "我国的政治体制从普鲁士时期的地方部分选举再到大战结束后的开放民主选举，帝国的行政体制虽然有了质的飞跃，但官员冗杂所导致的政治腐败和金钱交易困扰着我们，行政人员是帝国的未来，但目前的未来被一层阴云遮掩着，尚未见天日……"
 GER_Aftermath_of_November_Revolution: "十一月革命的余烬"
 GER_Aftermath_of_November_Revolution_desc: "在浩浩荡荡的革命浪潮中，通过艾伯特首相推行的一系列政策，我们成功稳定了帝国的局势并且一举粉碎了赤匪们的暴行，但就像他们所写的一样：“一个幽灵，一个共产主义的幽灵在欧洲大陆上徘徊。”\n\n我们没能活捉李卜克内西那群混蛋真是可惜，不过没时间为这些小事后悔了，近年来赤匪们又在我们的眼皮子底下搞小动作，这对帝国来说可不是个好消息。"
 GER_Shackles_of_Treaty_of_Versailles: "《凡尔赛条约》的枷锁"
 GER_Shackles_of_Treaty_of_Versailles_desc: "上次大战的战败让帝国损失了她广袤的殖民地和阳光下的土地，西普鲁士也被划给了波兰人，不仅如此，万恶的英法居然让帝国背负了主要的赔款，这是数十年发展也尚未还清的债款，但所幸我们距离还清赔款也不远了。"
 GER_turbulent_situation: "动荡不安的局面"
 GER_turbulent_situation_desc: "对于帝国的政局来说具有威胁的不仅仅是赤匪和腐败而已，还有军部愈发栓紧的锁链和那群做好了充足准备的野心家，他们让帝国走上了半民主的道路，现在却想以民主之名架空皇帝而让自己成为新皇，这是不可容忍的，也是帝国未来需要阻止的。"
 GER_Shadow_of_War: "战火带来的阴影"
 GER_Shadow_of_War_desc: "上次大战带来的破坏，对于帝国来说可以说是毁灭性的，我们损失了数百万的兵力，他们的家人失去了他们的丈夫，他们的父亲，他们的儿子……而我们却因深陷赔款中连他们的抚恤金都出不起，愿意为帝国效力的年轻人也越来越少了，帝国的兵源正如一口井，它在逐渐干涸，并最终走向覆灭。"
 GER_Imperial_Army_1: "帝国陆军"
 GER_Imperial_Army_1_desc: "米拉伯伯爵曾经这么评价普鲁士军队：“普鲁士不是一个拥有军队的国家，而是一支拥有国家的军队。”\n\n正如此言，因为这支强大的陆军，普鲁士从七年战争再到王朝战争未尝败绩，凡尔赛宫的加冕更为这支军队戴上了桂冠。\n\n上次大战中，帝国的陆军战无不胜，攻无不克，若非反贼临时起义，帝国陆军必将大步向前称霸整个欧陆。\n\n着眼于当下，总参谋部腐败无能，帝国士兵懒惰怠慢，军事装备冗杂待换，尽管如此，我们仍需向前看。帝国的陆军即将迎来一场改革，而这场改革不会遥远。"
 GER_Imperial_Navy_1: "帝国海军"
 GER_Imperial_Navy_1_desc: "帝国强大的公海舰队在上次大战中让英国人闻风丧胆，舰队的规模虽不及世界第一海军，但也能与其平分秋色，但由于部分官员的贪污，海军军费正逐渐减少，再加之伦敦的金融危机，我们能给海军发的钱越来越少，现在甚至连水兵们的军饷都快发不起了，不管怎么样，再苦一苦海军吧……"
 GER_Imperial_AirForce_1: "帝国空军"
 GER_Imperial_AirForce_1_desc: "帝国的空军是在上次大战结束之后组建起来的新式军队，它是帝国的璀璨宝石，也是帝国的坚硬柱石，拥有这支新式军队，钢铁雄鹰展翅高飞，必将称霸整个苍穹！\n\n但现实却是，空军长期缺少经费，虽然帝国已经将海军的部分经费转移给空军，但目前空军的情况不容乐观。"
 