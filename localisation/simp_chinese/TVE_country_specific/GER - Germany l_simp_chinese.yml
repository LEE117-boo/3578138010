 GER_wilhelm_ii: "威廉二世"
 GER_wilhelm_ii_desc:0 "腓特烈·威廉·维克托·阿尔贝特·冯·普鲁士，伟大的德意志皇帝兼普鲁士国王，德意志帝国的伟大统帅。\n威廉出生于其伯祖父普鲁士国王腓特烈·威廉四世统治期间，他也是英国维多利亚女王42名孙辈中最年长的。1888年3月，威廉的父亲腓特烈·威廉以腓特烈三世的身份继承了德意志和普鲁士王位，在即位仅仅99天后去世。同年威廉即位，这一时期也被称为“三皇之年”。\n1890年3月，年轻的德皇罢免了长期担任德国宰相的奥托·冯·俾斯麦，直接掌控国家政策，开启了他著名的“世界政策”，调整了帝国在历史长河中前进的航线。在他统治期间，德意志殖民帝国在东亚和太平洋获得了新领土，并成为了欧洲最大的工业国。然而威廉经常在未事先征求部长意见的情况下对其他国家发表激烈且具有威胁性的言论。\n同时他的政权深度参与殖民冲突，他进行大规模的海军扩充、争夺法国对摩洛哥的控制并且计划修建巴格达铁路来挑战英国在波斯湾的统治，从而在很大程度上疏远了其他大国。也导致了日后欧陆军备竞赛局面的形成。\n威廉是一位松懈的战时领导人，在那场结束一切战争的战争爆发时，他几乎把有关战争战略和组织的所有决策都交给了德国陆军总参谋部。到1916年8月，这种权力下放催生了一个军事独裁政权，由元帅兴登堡和总参谋部长鲁登道夫控制。在战争的剩余时间里，这一政府主导着国家的政策，直到十一月革命的发生，国家的领导权才重新回到了威廉的手里。\n在无奈承认战败之后，威廉开始了帝国的民主化，尽管本人具有保守派倾向，但其下放权力的行为同样是威廉本人在被架空后自暴自弃的体现。\n但幸运的是，年迈的皇帝挑人的目光并未随年龄的增长而下降，反而因为岁月的洗刷，这位年轻气盛的皇帝变得城府颇深，慧眼识珠的他任命了多位能人来掌管帝国这艘巨轮并让这艘巨轮能够平稳航行\n皇帝已经到了暮年，但反贼仍在行动，他必须采取措施，让反贼的恶行归于黑夜，让光亮的光线指引前进，让祖辈的千年帝国之梦得以实现。"
 GER_wilhelm_ii_sl_desc:0 "\n\n\n§Y威廉二世§!\n\n\n\n\n\n\n\£GFX_leader_GER_wilhelm_ii_Progressivism_large\n\n\n\n\n\n\n\n\n§Y凯撒§!\n - 稳定度: §G+5%§!\n - 战争支持度: §G+5%§!\n - 每日政治点数: §G+50%§!\n-------------\n§L腓特烈·威廉·维克托·阿尔贝特·冯·普鲁士，伟大的德意志皇帝兼普鲁士国王，德意志帝国的伟大统帅。\n威廉出生于其伯祖父普鲁士国王腓特烈·威廉四世统治期间，他也是英国维多利亚女王42名孙辈中最年长的。1888年3月，威廉的父亲腓特烈·威廉以腓特烈三世的身份继承了德意志和普鲁士王位，在即位仅仅99天后去世。同年威廉即位，这一时期也被称为“三皇之年”。\n1890年3月，年轻的德皇罢免了长期担任德国宰相的奥托·冯·俾斯麦，直接掌控国家政策，开启了他著名的“世界政策”，调整了帝国在历史长河中前进的航线。在他统治期间，德意志殖民帝国在东亚和太平洋获得了新领土，并成为了欧洲最大的工业国。然而威廉经常在未事先征求部长意见的情况下对其他国家发表激烈且具有威胁性的言论。\n同时他的政权深度参与殖民冲突，他进行大规模的海军扩充、争夺法国对摩洛哥的控制并且计划修建巴格达铁路来挑战英国在波斯湾的统治，从而在很大程度上疏远了其他大国。也导致了日后欧陆军备竞赛局面的形成。\n威廉是一位松懈的战时领导人，在那场结束一切战争的战争爆发时，他几乎把有关战争战略和组织的所有决策都交给了德国陆军总参谋部。到1916年8月，这种权力下放催生了一个军事独裁政权，由元帅兴登堡和总参谋部长鲁登道夫控制。在战争的剩余时间里，这一政府主导着国家的政策，直到十一月革命的发生，国家的领导权才重新回到了威廉的手里。\n在无奈承认战败之后，威廉开始了帝国的民主化，尽管本人具有保守派倾向，但其下放权力的行为同样是威廉本人在被架空后自暴自弃的体现。\n但幸运的是，年迈的皇帝挑人的目光并未随年龄的增长而下降，反而因为岁月的洗刷，这位年轻气盛的皇帝变得城府颇深，慧眼识珠的他任命了多位能人来掌管帝国这艘巨轮并让这艘巨轮能够平稳航行\n皇帝已经到了暮年，但反贼仍在行动，他必须采取措施，让反贼的恶行归于黑夜，让光亮的光线指引前进，让祖辈的千年帝国之梦得以实现。§!"
