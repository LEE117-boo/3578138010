 GER_Prussian_military_spirit: "普鲁士军魂"
 GER_Prussian_military_spirit_desc: "军国主义在曾经的一段时间内成为了普鲁士的代言词，但这同样也是组织起整个国家的最好工具，我国的历代君主都率领此军创造了历史上一个又一个的军事奇迹，拥有此军帝国必将战无不胜，只待一个时机，德意志的钢铁将和鲜血一起铸就欧陆的新秩序！一支拥有国家的军队——这就是帝国的答案！"
 GER_Bureaucratic_administrative_system: "臃肿的行政系统"
 GER_Bureaucratic_administrative_system_desc: "\n\n\n\n£GFX_idea_GER_Bureaucratic_administrative_system_Pictures\n\n\n\n\n\n我国的政治体制从普鲁士时期的地方部分选举再到大战结束后的开放民主选举，帝国的行政体制虽然有了质的飞跃，但官员冗杂所导致的政治腐败和金钱交易困扰着我们，行政人员是帝国的未来，但目前的未来被一层阴云遮掩着，尚未见天日……"
 GER_Aftermath_of_November_Revolution: "十一月革命的余烬"
 GER_Aftermath_of_November_Revolution_desc: "在浩浩荡荡的革命浪潮中，通过艾伯特首相推行的一系列政策，我们成功稳定了帝国的局势并且一举粉碎了赤匪们的暴行，但就像他们所写的一样：“一个幽灵，一个共产主义的幽灵在欧洲大陆上徘徊。”\n\n我们没能活捉李卜克内西那群混蛋真是可惜，不过没时间为这些小事后悔了，近年来赤匪们又在我们的眼皮子底下搞小动作，这对帝国来说可不是个好消息。"
 GER_Shackles_of_Treaty_of_Versailles: "《凡尔赛条约》的枷锁"
 GER_Shackles_of_Treaty_of_Versailles_desc: "上次大战的战败让帝国损失了她广袤的殖民地和阳光下的土地，西普鲁士也被划给了波兰人，不仅如此，万恶的英法居然让帝国背负了主要的赔款，这是数十年发展也尚未还清的债款，但所幸我们距离还清赔款也不远了。"
 GER_turbulent_situation: "动荡不安的局面"
 GER_turbulent_situation_desc: "\n\n\n\n£GFX_idea_GER_turbulent_situation_Pictures\n\n\n\n\n\n对于帝国的政局来说具有威胁的不仅仅是赤匪和腐败而已，还有军部愈发栓紧的锁链和那群做好了充足准备的野心家，他们让帝国走上了半民主的道路，现在却想以民主之名架空皇帝而让自己成为新皇，这是不可容忍的，也是帝国未来需要阻止的。"
 GER_Shadow_of_War_1: "战火带来的阴影"
 GER_Shadow_of_War_1_desc: "\n\n\n\n£GFX_idea_GER_Shadow_of_War_Pictures\n\n\n\n\n\n上次大战带来的破坏，对于帝国来说可以说是毁灭性的，我们损失了数百万的兵力，他们的家人失去了他们的丈夫，他们的父亲，他们的儿子……而我们却因深陷赔款中连他们的抚恤金都出不起，愿意为帝国效力的年轻人也越来越少了，帝国的兵源正如一口井，它在逐渐干涸，并最终走向覆灭。"
 GER_Shadow_of_War_2: "战火带来的阴影"
 GER_Shadow_of_War_2_desc: "\n\n\n\n£GFX_idea_GER_Shadow_of_War_Pictures\n\n\n\n\n\n上次大战带来的破坏，对于帝国来说可以说是毁灭性的，我们损失了数百万的兵力，他们的家人失去了他们的丈夫，他们的父亲，他们的儿子……而我们却因深陷赔款中连他们的抚恤金都出不起，愿意为帝国效力的年轻人也越来越少了，帝国的兵源正如一口井，它在逐渐干涸，并最终走向覆灭。"
 GER_Imperial_Army_1: "帝国陆军"
 GER_Imperial_Army_1_desc: "米拉伯伯爵曾经这么评价普鲁士军队：“普鲁士不是一个拥有军队的国家，而是一支拥有国家的军队。”\n\n正如此言，因为这支强大的陆军，普鲁士从七年战争再到王朝战争未尝败绩，凡尔赛宫的加冕更为这支军队戴上了桂冠。\n\n上次大战中，帝国的陆军战无不胜，攻无不克，若非反贼临时起义，帝国陆军必将大步向前称霸整个欧陆。\n\n着眼于当下，总参谋部腐败无能，帝国士兵懒惰怠慢，军事装备冗杂待换，尽管如此，我们仍需向前看。帝国的陆军即将迎来一场改革，而这场改革不会遥远。"
 GER_Imperial_Navy_1: "帝国海军"
 GER_Imperial_Navy_1_desc: "\n\n\n\n£GFX_idea_GER_Imperial_Navy_Pictures\n\n\n\n\n\n帝国强大的公海舰队在上次大战中让英国人闻风丧胆，舰队的规模虽不及世界第一海军，但也能与其平分秋色，但由于部分官员的贪污，海军军费正逐渐减少，再加之伦敦的金融危机，我们能给海军发的钱越来越少，现在甚至连水兵们的军饷都快发不起了，不管怎么样，再苦一苦海军吧……"
 GER_Imperial_AirForce_1: "帝国空军"
 GER_Imperial_AirForce_1_desc: "帝国的空军是在上次大战结束之后组建起来的新式军队，它是帝国的璀璨宝石，也是帝国的坚硬柱石，拥有这支新式军队，钢铁雄鹰展翅高飞，必将称霸整个苍穹！\n\n但现实却是，空军长期缺少经费，虽然帝国已经将海军的部分经费转移给空军，但目前空军的情况不容乐观。"

 GER_clinging_to_life: "苟延残喘"
 GER_clinging_to_life_desc: "在帝国战败过后，国内政治环境朝着极端化的道路越走越远，帝国的左翼势力正在崛起，虽然通过对革命的不断镇压能够稳住我们的政权，但帝国整体的局面并不容乐观，政治暴力，经济萧条，军队不忠……不管怎么说，帝国这艘巨轮都在平稳航行，前途未卜……"
 GER_last_debt: "最后一笔债务"
 GER_last_debt_desc: "关于战败的赔偿问题一直是让议会头疼的问题，不过在施特雷泽曼内阁的带领下，帝国已经偿还了大部分的赔款，关于最后一笔赔款早就提上了日程，在皇帝的授意下，我们也将最后一笔赔款偿还，让帝国的经济走上正轨。"
 GER_Berlin_military_parade:0 "柏林阅兵"
 GER_Berlin_military_parade_desc:0 "在赔款得以偿还后，我们也是时候来一次规模盛大的阅兵来稳住帝国公民糟乱的心了，这场阅兵仪式将在帝国的心脏——柏林举行，让军队的小伙子们动起来，向世界展示摆脱束缚的帝国将会多么强大！"
 GER_workers_riot:0 "工人暴乱"
 GER_workers_riot_desc:0 "一次盛大的仪式，一次突然的暴动……"
 GER_A_quiet_night:0 "寂静的夜晚"
 GER_A_quiet_night_desc:0 "工人们在赤匪们的煽动下发起了暴动，这绝对是不可容忍的，见此情形，显然动用部分宵禁条款是有必要的了，但在那之前……我们会让那些乱事的人永远的闭嘴……"
 GER_declare_a_state_of_emergency:0 "宣布紧急状态"
 GER_declare_a_state_of_emergency_desc:0 "此次事件因为我们的行动过于激进而导致更大的暴乱在帝国各处不断地发生，是时候命令首相发布戒严令来结束这一切了。"
 GER_Stable_parliament:0 "稳定议会"
 GER_Stable_parliament_desc:0 "帝国正值动荡时期，为了不让帝国名义上的民主彻底消亡，我们必须先稳住议会里面的议员们，加油干吧小伙子们，帝国命不该绝啊……"
 GER_open_partial_elections:0 "开放部分选举"
 GER_open_partial_elections_desc:0 "在我们与议会里面那群民主人士交涉后，一个妥协方案被放在了台面上——改革普鲁士的三级选举制度，让所有人都能参与选举。我们对这个方案也只能阴奉阳违，在那些自由思想深入人心的城市这么干就好了。"
 GER_Settle_unemployed_youth:0 "安顿失业青年"
 GER_Settle_unemployed_youth_desc:0 "对于因经济危机而失业的帝国公民来讲，他们需要一个能让他们暂时吃上牛奶和面包的工作，关于此事，布吕宁专员提出了个非常具有建设性的意见——让那些失业的青年去容克们的庄园里劳作，虽然这会导致部分保守派容克们的不满，但对帝国的发展来说确实是权宜之计。"
 GER_appease_the_military:0 "安抚军方"
 GER_appease_the_military_desc:0 "军方最近开展的行动让陛下寝食难安，为了给陛下一个交代，同时也为了保住帝国的民主制度，我们必须和军方交涉，让他们老实一点。"
 GER_Summon_Schleicher:0 "召见施莱谢尔"
 GER_Summon_Schleicher_desc:0 "施莱歇尔，这个野心家，他在阴谋篡夺整个帝国的权力，就像兴登堡和鲁登道夫在1916年干的那样！我们必须召他过来，通过旁敲侧击让他明白自己为什么能坐上这个位置！"
 GER_Extinguish_the_flames:0 "让火焰熄灭"
 GER_Extinguish_the_flames_desc:0 "终于结束了这些繁琐的事务，好了，让军队中的反贼也暂时消停会，让反叛的火焰暂时熄灭吧……"
 GER_Preparations_for_the_1935_ge:0 "筹备1935年大选"
 GER_Preparations_for_the_1935_ge_desc:0 "在忙碌了一段时间后，每五年举行的首相选举又要到了，让我们静候佳音，看看是谁能够胜任这份工作吧……"

