#民族精神
FRA_A_dim_and_lp: "黯淡无光的议会"
FRA_A_dim_and_lp_desc: "\n\n\n\n£GFX_FRA_A_dim_and_lp_Pictures\n\n\n\n\n\n法兰西悠久的历史中，自1789年革命以来，民主就成为法国民族精神之一，不过这一百余年来保皇党，教会等等形形色色的反民主分子对自由平等博爱的攻击从未停止，从路易到波拿巴再到布朗热，从雾月十八日到德雷福斯案，法兰西的民主饱受摧残。\n一战后，“这场结束一切的战争”变成了民主死亡的加速器。战后经济凋敝，人民怨声载道，军队最终推翻了文官政府开始无限制戒严状态。不过左翼势力，民主的拥护者坚决反对，法国由此在1920年爆发一场小规模内战，当军队抬头看着战胜敌人的成果后，他们不得不退居幕后，“恢复”民主，同时成立行政委员会真正把握权力，现在看来，议会已经失去了他的作用，并且成为一个巨大的火药桶，威胁着所有人。"
FRA_French_Armed_Forces: "法兰西武装力量"
FRA_French_Armed_Forces_desc: "\n\n\n\n£GFX_FRA_French_Armed_Forces_Pictures\n\n\n\n\n\n“§Y我们最强，强者必胜。——保罗·雷诺”§!\n\n法兰西第一支常备军可以追溯到15世纪初路易十四时期，法国陆军因其制度与素质的优势和庞大的体量，成为欧洲第一陆军，但是在普法战争中还是输给了德意志人，此后我们的军队建设一直以复仇为最终目标。\n在一战中，我们流光了一代人的血，才把黑鹰傲人的宝座砸个稀巴烂。战后的军政府对军队进行高投入政策，哪怕是到了委员会行政也没有停止，士兵冗肿无能，将领们贪污腐败，国防部元帅们头脑老旧思想陈腐。\n\n目前来看，法国的军队毫无未来。"
FRA_French_Colonial_Office: "法兰西殖民总局"
FRA_French_Colonial_Office_desc: "为了管辖这一大片充斥着落后与腐臭的土地，我们设立了由欧洲法兰西官员所掌控的庞大殖民机构-法兰西殖民总局及所下辖分局。\n在殖民局的管控之下，飘散着黄沙的黑暗大陆上数以万计的黑人土著供我们劳作着。然而，令人感到愤怒的是,自我们征服这篇土地以来，那群奴隶从未停止抱怨和反抗，暴乱和停工自从征服后就从未停止。\n\n为了维持殖民帝国的运转，让商品原材料、劳动力、奇异珍宝、贵重金属等等资源源源不断的向本土的运输，我们不得不耗费越来越多的兵力警力向法兰西殖民总局提供支援。但即便如此，我们在非洲依旧损失惨重，每时每日都有法兰西驻军倒在掺杂着鲜血的红黄色沙地上，而这种悲剧依旧不停的上演……"
FRA_Council_of_Ministers: "幕后的傀儡师"
FRA_Council_of_Ministers_desc: "\n\n\n\n£GFX_FRA_Council_of_Ministers_Pictures\n\n\n\n\n\n现在来看，法国的政治是一场错综复杂的华丽演出，而高级军官团、垄断财阀、民兵集团、官僚集团就是操纵着国家机器的傀儡师，他们在幕后相互使绊谋算，为完成对共和国的完全控制而进行着无处不在的明争暗斗。\n高级军官团希望全国整军备战迈入军国化、激进化的未来，垄断企业则计划着自己的商业帝国的大手伸向全世界榨取滔天利润。民兵集团为了自己政治理念时而与政府对反对派大大出手而又转身向“老板”身上攫取利益，官僚集团将结党私营和腐败体现得淋漓尽致。他们所有人在为了掌控全国而在法兰西的每一个角落上布下自己的势力，又或是埋下一颗不知何时爆炸的地雷。但同时，旧日的激进民主派、共产主义者，学生运动等等不会因为军政府的状令和议会的无用化而失去抵抗的决心，他们也是傀儡师们最无法控制度一群人。\n我们尚不清楚谁将或者这场权力斗争的胜利，但可以确认的是他们有数不尽的”木偶“和”丝线”国家就将在他们的操纵中走向彼岸。\n§R机会是不守纪律的。——雨果§!"
